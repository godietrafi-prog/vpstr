<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Birthday Disco: Rafi</title>
<style>
*{box-sizing:border-box}html,body{width:100%;height:100%;margin:0;overflow:hidden}body{display:grid;place-items:center;background:#17102d;font-family:Arial,sans-serif}.card{position:relative;width:min(100vw,56.25vh);height:min(100vh,177.78vw);min-height:580px;overflow:hidden;color:#fff;text-align:center;background:linear-gradient(145deg,#201044,#3d176c 55%,#102d59)}.rays{position:absolute;left:-35%;bottom:-8%;width:170%;height:58%;background:repeating-conic-gradient(from 0deg at 50% 100%,rgba(255,72,154,.22) 0 9deg,transparent 9deg 19deg)}.kicker{position:absolute;top:5%;left:0;right:0;color:#66f4df;font-size:clamp(11px,1.7vw,19px);font-weight:800;letter-spacing:.22em;text-transform:uppercase}.copy{position:absolute;z-index:2;top:11%;left:7%;right:7%}h1{margin:.25em 0 0;font-size:clamp(43px,10.4vw,116px);line-height:.92;letter-spacing:-.06em;text-transform:uppercase;text-shadow:.06em .06em 0 #ff489a}h1 span{display:block;color:#ffe45c;font-family:Georgia,serif;font-style:italic;text-transform:none;animation:pulse 2.8s ease-in-out infinite}.wish{margin:1em auto 0;max-width:21em;font-size:clamp(16px,2.6vw,29px);font-weight:700;line-height:1.35}.ball{position:absolute;z-index:1;left:20%;right:20%;bottom:10%;height:33%;animation:turn 12s linear infinite}.ball svg{width:100%;height:100%;filter:drop-shadow(0 0 25px rgba(102,244,223,.35))}.notes{position:absolute;inset:0}.notes i{position:absolute;color:#66f4df;font:900 clamp(25px,5vw,55px) Georgia;animation:float 4s ease-in-out infinite}.notes i:nth-child(1){left:9%;bottom:28%}.notes i:nth-child(2){right:10%;bottom:35%;animation-delay:-2s;color:#ff489a}.footer{position:absolute;bottom:3.5%;left:7%;right:7%;font-size:clamp(10px,1.4vw,17px);font-weight:800;letter-spacing:.15em;text-transform:uppercase;color:#66f4df}@keyframes pulse{50%{transform:scale(1.06) rotate(-2deg)}}@keyframes turn{50%{transform:rotate(4deg) scale(1.03)}}@keyframes float{50%{transform:translateY(-20px) rotate(8deg)}}@media(max-width:600px){h1{font-size:clamp(40px,10vw,60px)}.wish{font-size:clamp(16px,4vw,22px)}.ball{left:22%;right:22%;height:30%}}@media(prefers-reduced-motion:reduce){*{animation:none!important}}</style>
</head>
<body>
<main class="card">
<div class="rays">
</div>
<div class="kicker">Tonight's headline act</div>
<section class="copy">
<h1>Happy<br>Birthday<br>
<span>Rafi!</span>
</h1>
<p class="wish">Turn up the joy, cue the good vibes, and dance into a brilliant new year.</p>
</section>
<div class="ball" aria-hidden="true">
<svg viewBox="0 0 400 400">
<defs>
<radialGradient id="g">
<stop stop-color="#fff"/>
<stop offset=".45" stop-color="#b9c9ff"/>
<stop offset="1" stop-color="#6347ad"/>
</radialGradient>
</defs>
<circle cx="200" cy="200" r="150" fill="url(#g)"/>
<g fill="none" stroke="#fff" stroke-opacity=".55" stroke-width="5">
<path d="M50 200h300M70 130h260M70 270h260M200 50v300M130 70v260M270 70v260"/>
<circle cx="200" cy="200" r="150"/>
</g>
<path d="M132 112c43-36 91-43 134-20" fill="none" stroke="#fff" stroke-width="14" stroke-linecap="round" opacity=".8"/>
</svg>
</div>
<div class="notes">
<i>♪</i>
<i>♫</i>
</div>
<div class="footer">Research tomorrow. Dance floor today.</div>
</main>
<style>.copy{left:11%;right:11%;z-index:3}h1{font-size:clamp(34px,8.4vw,94px);letter-spacing:-.055em}h1 span{white-space:nowrap}.wish{font-size:clamp(15px,2.4vw,26px);max-width:20em}.ball{left:24%;right:24%;height:29%}@media(max-width:600px){h1{font-size:clamp(32px,8.2vw,48px)}.wish{font-size:clamp(15px,3.7vw,20px)}}</style>
<style>.card{width:100%;height:100%;min-height:0}h1 span{display:inline-block}.kicker{font-size:clamp(16px,2.2vw,26px)}.wish{font-size:clamp(24px,3.5vw,42px);max-width:18em}.ball{left:20%;right:20%;height:35%}.footer{font-size:clamp(14px,1.8vw,22px)}</style>
<script>function safeFit(){var n=document.querySelector('h1 span'),m=location.search.match(/[?&]name=([^&]*)/),s,w;if(!n)return;n.textContent=(m?decodeURIComponent(m[1].replace(/\+/g,' ')):'Rafi')+' !';n.style.fontSize='';s=parseFloat(getComputedStyle(n).fontSize);w=n.parentNode.clientWidth*.9;while(n.scrollWidth>w&&s>22){s--;n.style.fontSize=s+'px'}}safeFit();addEventListener('resize',safeFit)</script>
</body>
</html>
