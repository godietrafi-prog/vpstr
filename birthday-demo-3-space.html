<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Birthday Launch: Rafi</title>
<style>
*{box-sizing:border-box}html,body{width:100%;height:100%;margin:0;overflow:hidden}body{display:grid;place-items:center;background:#061a35;font-family:"Trebuchet MS",Arial,sans-serif}.card{position:relative;width:min(100vw,56.25vh);height:min(100vh,177.78vw);min-height:580px;overflow:hidden;color:#eafcff;text-align:center;background:linear-gradient(#071936,#123b69 62%,#7253a0)}.stars{position:absolute;inset:0;background-image:radial-gradient(circle,#fff 0 1px,transparent 1.5px),radial-gradient(circle,#80f1dd 0 1.5px,transparent 2px);background-size:57px 57px,91px 91px;background-position:7px 12px,30px 4px;opacity:.7}.planet{position:absolute;width:70%;height:20%;border:12px solid rgba(255,208,92,.32);border-radius:50%;right:-30%;top:46%;transform:rotate(-18deg)}.copy{position:absolute;z-index:2;top:7%;left:7%;right:7%}.kicker{color:#80f1dd;font-size:clamp(11px,1.6vw,18px);font-weight:900;letter-spacing:.2em;text-transform:uppercase}h1{margin:.35em 0 .15em;font-size:clamp(43px,9.8vw,108px);line-height:.94;letter-spacing:-.055em}h1 span{display:block;color:#ffcf5c;font-family:Georgia,serif;font-style:italic;text-shadow:.045em .045em 0 #ef597b}.wish{margin:.8em auto 0;max-width:20em;font-size:clamp(16px,2.6vw,29px);line-height:1.35;font-weight:700}.scene{position:absolute;z-index:1;left:17%;right:17%;bottom:7%;height:38%;animation:drift 3.5s ease-in-out infinite}.scene svg{width:100%;height:100%;overflow:visible;filter:drop-shadow(0 15px 12px rgba(0,0,0,.25))}.flame{transform-box:fill-box;transform-origin:50% 0;animation:flame 1s ease-in-out infinite alternate}.moon{position:absolute;left:-12%;bottom:-5%;width:75%;height:22%;background:#d9e6ee;border-radius:50% 50% 0 0;box-shadow:inset 0 16px 0 #c1d0de}.footer{position:absolute;z-index:2;bottom:3%;left:6%;right:6%;color:#80f1dd;font-size:clamp(10px,1.4vw,17px);font-weight:900;letter-spacing:.12em;text-transform:uppercase}@keyframes drift{50%{transform:translateY(-10px) rotate(2deg)}}@keyframes flame{to{transform:scale(.8,1.12)}}@media(max-width:600px){h1{font-size:clamp(40px,9.8vw,58px)}.wish{font-size:clamp(16px,4vw,22px)}.scene{height:34%;left:20%;right:20%}}@media(prefers-reduced-motion:reduce){*{animation:none!important}}</style>
</head>
<body>
<main class="card">
<div class="stars">
</div>
<div class="planet">
</div>
<section class="copy">
<div class="kicker">Mission control confirms</div>
<h1>Happy Birthday,<span>Rafi!</span>
</h1>
<p class="wish">Another trip around the sun. May this orbit bring bold discoveries and stellar surprises.</p>
</section>
<div class="scene" aria-hidden="true">
<svg viewBox="0 0 420 520">
<g transform="translate(65 10)">
<path d="M145 35c66 42 90 135 61 227l-21 68H75l-21-68C25 170 49 77 115 35l15-10z" fill="#f4f5f7"/>
<path d="M115 35c9-17 21-27 30-32 10 6 22 16 30 32z" fill="#ffcf5c"/>
<circle cx="130" cy="147" r="39" fill="#80f1dd" stroke="#123b69" stroke-width="12"/>
<path d="M75 260L22 341l67-20M185 260l53 81-67-20" fill="#ef597b"/>
<path d="M100 330h60l-12 48h-36z" fill="#243c73"/>
<g class="flame">
<path d="M110 375h40c18 43-2 89-20 119-19-31-39-77-20-119z" fill="#ef597b"/>
<path d="M119 375h22c9 28-1 54-11 74-11-20-21-46-11-74z" fill="#ffcf5c"/>
</g>
</g>
</svg>
</div>
<div class="moon">
</div>
<div class="footer">Have a blast, birthday astronaut.</div>
</main>
<style>.copy{left:9%;right:9%;z-index:4}h1{font-size:clamp(36px,8.5vw,96px)}h1 span{white-space:nowrap}.wish{position:relative;z-index:5;max-width:19em;padding:.5em .7em;border-radius:12px;background:rgba(7,25,54,.88);font-size:clamp(15px,2.35vw,26px)}.scene{left:21%;right:21%;bottom:5%;height:32%;z-index:1}@media(max-width:600px){h1{font-size:clamp(33px,8.2vw,48px)}.wish{font-size:clamp(15px,3.65vw,20px)}.scene{left:23%;right:23%;height:30%}}</style>
<style>
.card{width:100%;height:100%;min-height:0}
.copy{top:5%;left:9%;right:9%}
h1 span{display:table;margin:.08em auto 0;white-space:nowrap}
.kicker{font-size:clamp(16px,2.2vw,26px)}
.wish{font-size:clamp(24px,3.5vw,42px);max-width:18em}
.scene{left:18%;right:18%;bottom:7%;height:35%}
.footer{z-index:5;left:22%;right:22%;bottom:2.2%;padding:.55em .8em;border-radius:999px;background:rgba(217,230,238,.92);color:#123b69;font-size:clamp(14px,1.8vw,22px);text-shadow:none}
.scene{animation:launch 6s ease-in-out infinite alternate}
@keyframes launch{from{transform:translateY(10px) rotate(-1deg)}to{transform:translateY(-90px) rotate(2deg)}}
</style>
<script>function safeFit(){var n=document.querySelector('h1 span'),m=location.search.match(/[?&]name=([^&]*)/),s,w;if(!n)return;n.textContent=(m?decodeURIComponent(m[1].replace(/\+/g,' ')):'Rafi')+' !';n.style.fontSize='';s=parseFloat(getComputedStyle(n).fontSize);w=n.parentNode.clientWidth*.9;while(n.scrollWidth>w&&s>22){s--;n.style.fontSize=s+'px'}}safeFit();addEventListener('resize',safeFit)</script>
</body>
</html>
