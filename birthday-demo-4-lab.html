<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Birthday Experiment: Rafi</title>
<style>
*{box-sizing:border-box}html,body{width:100%;height:100%;margin:0;overflow:hidden}body{display:grid;place-items:center;background:#153c38;font-family:"Trebuchet MS",Arial,sans-serif}.card{position:relative;width:min(100vw,56.25vh);height:min(100vh,177.78vw);min-height:580px;overflow:hidden;color:#173c38;background:#f7f0d9}.grid{position:absolute;inset:0;background-image:linear-gradient(rgba(23,60,56,.08) 1px,transparent 1px),linear-gradient(90deg,rgba(23,60,56,.08) 1px,transparent 1px);background-size:34px 34px}.tape{position:absolute;top:4%;left:34%;right:34%;height:4%;background:#ffd14e;transform:rotate(-2deg);opacity:.8}.copy{position:absolute;z-index:2;top:9%;left:7%;right:7%;text-align:center}.kicker{display:inline-block;padding:.45em .9em;background:#173c38;color:#fff;font-size:clamp(11px,1.6vw,18px);font-weight:900;letter-spacing:.13em;text-transform:uppercase;transform:rotate(-1deg)}h1{margin:.35em 0 .12em;font-family:Georgia,serif;font-size:clamp(41px,9.8vw,108px);line-height:.93;letter-spacing:-.055em}h1 span{display:block;color:#ef5a59;font-family:"Comic Sans MS","Segoe Print",cursive;transform:rotate(-2deg);animation:pop 3s ease-in-out infinite}.wish{margin:.9em auto 0;max-width:21em;font-size:clamp(16px,2.5vw,28px);line-height:1.35;font-weight:800}.formula{color:#148b7a}.scene{position:absolute;left:10%;right:10%;bottom:7%;height:35%;z-index:1}.scene svg{width:100%;height:100%;overflow:visible;filter:drop-shadow(0 12px 8px rgba(23,60,56,.18))}.bubble{animation:bubble 3s ease-in infinite;transform-box:fill-box;transform-origin:center}.b2{animation-delay:-1.4s}.footer{position:absolute;z-index:2;left:7%;right:7%;bottom:3%;text-align:center;font-size:clamp(10px,1.4vw,17px);font-weight:900;letter-spacing:.1em;text-transform:uppercase}@keyframes pop{50%{transform:rotate(1deg) scale(1.05)}}@keyframes bubble{0%{opacity:0;transform:translateY(20px) scale(.6)}40%{opacity:1}100%{opacity:0;transform:translateY(-65px) scale(1)}}@media(max-width:600px){h1{font-size:clamp(39px,9.6vw,57px)}.wish{font-size:clamp(16px,3.9vw,21px)}.scene{height:32%;left:13%;right:13%}}@media(prefers-reduced-motion:reduce){*{animation:none!important}}</style>
</head>
<body>
<main class="card">
<div class="grid">
</div>
<div class="tape">
</div>
<section class="copy">
<div class="kicker">Experimental result: 100% confirmed</div>
<h1>Happy Birthday,<span>Rafi!</span>
</h1>
<p class="wish">Today's formula: <span class="formula">curiosity + laughter + cake</span> = one excellent year ahead.</p>
</section>
<div class="scene" aria-hidden="true">
<svg viewBox="0 0 600 430">
<path d="M70 374h460" stroke="#173c38" stroke-width="12" stroke-linecap="round"/>
<path d="M158 80v83L85 337c-10 24 8 49 34 49h177c26 0 44-25 34-49l-73-174V80" fill="#fff" stroke="#173c38" stroke-width="12" stroke-linejoin="round"/>
<path d="M119 286h177l25 59c8 19-6 39-27 39H121c-21 0-35-20-27-39z" fill="#62d5c4"/>
<path d="M145 80h125" stroke="#173c38" stroke-width="18" stroke-linecap="round"/>
<circle class="bubble" cx="195" cy="255" r="19" fill="#ffd14e"/>
<circle class="bubble b2" cx="252" cy="282" r="13" fill="#ef5a59"/>
<g transform="translate(350 103)">
<rect x="0" y="64" width="150" height="219" rx="28" fill="#ef5a59" stroke="#173c38" stroke-width="12"/>
<path d="M31 64V0h88v64" fill="#fff" stroke="#173c38" stroke-width="12"/>
<path d="M28 151h94" stroke="#ffd14e" stroke-width="18" stroke-linecap="round"/>
<circle cx="49" cy="211" r="10" fill="#173c38"/>
<circle cx="101" cy="211" r="10" fill="#173c38"/>
<path d="M56 239c12 13 27 13 39 0" fill="none" stroke="#173c38" stroke-width="8" stroke-linecap="round"/>
</g>
</svg>
</div>
<div class="footer">Peer review says: definitely eat the cake.</div>
</main>
<style>.copy{left:9%;right:9%;z-index:4}h1{font-size:clamp(35px,8.4vw,94px)}h1 span{white-space:nowrap}.wish{position:relative;z-index:5;max-width:19em;padding:.45em .65em;border-radius:10px;background:rgba(247,240,217,.94);font-size:clamp(15px,2.35vw,26px)}.scene{left:14%;right:14%;bottom:5%;height:30%;z-index:1}@media(max-width:600px){h1{font-size:clamp(32px,8.1vw,47px)}.wish{font-size:clamp(15px,3.6vw,20px)}.scene{left:17%;right:17%;height:28%}}</style>
<style>.card{width:100%;height:100%;min-height:0}h1 span{display:inline-block}.kicker{font-size:clamp(15px,2vw,24px)}.wish{font-size:clamp(24px,3.4vw,41px);max-width:18em}.scene{left:10%;right:10%;height:38%}.footer{font-size:clamp(14px,1.8vw,22px)}</style>
<script>function safeFit(){var n=document.querySelector('h1 span'),m=location.search.match(/[?&]name=([^&]*)/),s,w;if(!n)return;n.textContent=(m?decodeURIComponent(m[1].replace(/\+/g,' ')):'Rafi')+' !';n.style.fontSize='';s=parseFloat(getComputedStyle(n).fontSize);w=n.parentNode.clientWidth*.9;while(n.scrollWidth>w&&s>22){s--;n.style.fontSize=s+'px'}}safeFit();addEventListener('resize',safeFit)</script>
</body>
</html>
