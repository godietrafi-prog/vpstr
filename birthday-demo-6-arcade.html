<!doctype html><html lang="en"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Birthday Arcade: Rafi</title><link rel="stylesheet" href="birthday-new-base.css"><style>body{background:#0b0820;color:#fff}.card{background:linear-gradient(160deg,#100a30,#24105a 55%,#071d38)}.grid{position:absolute;inset:45% 0 0;background:linear-gradient(rgba(75,245,220,.22) 2px,transparent 2px),linear-gradient(90deg,rgba(75,245,220,.22) 2px,transparent 2px);background-size:70px 70px;transform:perspective(420px) rotateX(58deg);transform-origin:bottom}.kicker{color:#59f5d8}h1{text-transform:uppercase;text-shadow:6px 6px 0 #ff3f91}h1 span{color:#ffe65b}.wish{color:#eafcff}.machine{animation:tilt 4s ease-in-out infinite}.ball{animation:ping 2.3s ease-in-out infinite}.footer{color:#59f5d8}@keyframes tilt{50%{transform:rotate(2deg) translateY(-8px)}}@keyframes ping{50%{transform:translate(70px,-90px)}} </style></head><body><main class="card"><div class="grid"></div><section class="copy"><div class="kicker">Player one has leveled up</div><h1>Happy Birthday<span data-name>Rafi !</span></h1><p class="wish">High score unlocked: more laughs, great people, and bonus cake.</p></section><div class="scene"><svg viewBox="0 0 760 600" aria-hidden="true"><g class="machine"><path d="M190 90h380l70 420H120z" fill="#ff3f91" stroke="#59f5d8" stroke-width="14"/><path d="M220 130h320l45 270H175z" fill="#151044" stroke="#fff" stroke-width="9"/><circle cx="280" cy="310" r="45" fill="#ffe65b"/><circle cx="477" cy="233" r="31" fill="#59f5d8"/><path d="M245 170h250" stroke="#ff8ec0" stroke-width="17" stroke-linecap="round"/><path d="M200 420h360l35 72H165z" fill="#ffe65b"/><circle cx="300" cy="458" r="22" fill="#24105a"/><circle cx="455" cy="458" r="22" fill="#24105a"/></g><circle class="ball" cx="310" cy="340" r="17" fill="#fff"/><path d="M82 540h596" stroke="#59f5d8" stroke-width="12" stroke-linecap="round"/></svg></div><div class="footer">Press start on a brilliant new year.</div></main><script src="birthday-new.js"></script></body></html>
