<!doctype html><html lang="en"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Birthday Comic: Rafi</title><link rel="stylesheet" href="birthday-new-base.css"><style>body{background:#111;color:#111}.card{background-color:#ffe24f;background-image:radial-gradient(#e54b4b 2px,transparent 3px);background-size:18px 18px;border:14px solid #111}.copy{top:4%}.kicker{display:inline-block;padding:.35em .8em;background:#111;color:#fff;transform:rotate(-2deg)}h1{font-family:Impact,"Arial Black",sans-serif;text-transform:uppercase;text-shadow:7px 7px 0 #fff}h1 span{color:#e83f5b}.wish{padding:.55em .7em;background:#fff;border:8px solid #111;box-shadow:10px 10px 0 #38b6cf;transform:rotate(1deg)}.burst{animation:pop 2.8s ease-in-out infinite}.footer{padding:.45em;background:#111;color:#fff}.zap{animation:zap 2s steps(2) infinite}@keyframes pop{50%{transform:scale(1.06) rotate(3deg)}}@keyframes zap{50%{opacity:.35}}</style></head><body><main class="card"><section class="copy"><div class="kicker">Breaking news</div><h1>Happy Birthday<span data-name>Rafi !</span></h1><p class="wish">Your superpower today is turning ordinary moments into a great celebration.</p></section><div class="scene"><svg viewBox="0 0 760 570" aria-hidden="true"><path class="burst" d="M380 20l50 98 103-51-13 112 114 2-75 86 94 65-108 34 46 104-111-19-18 113-82-80-82 80-18-113-111 19 46-104-108-34 94-65-75-86 114-2-13-112 103 51z" fill="#38b6cf" stroke="#111" stroke-width="13"/><text x="380" y="315" text-anchor="middle" font-family="Impact,Arial Black" font-size="125" fill="#fff" stroke="#111" stroke-width="8">WOW!</text><path class="zap" d="M70 90l80 55-50 18 72 60M650 80l-70 65 55 8-68 67" fill="none" stroke="#e83f5b" stroke-width="20" stroke-linecap="round"/></svg></div><div class="footer">Issue number one: cake saves the day.</div></main><script src="birthday-new.js"></script></body></html>
