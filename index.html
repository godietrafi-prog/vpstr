<!DOCTYPE html>
<html lang="he">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>View Left</title>
    <script src="lib/pdf.min.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        html, body {
            width: 100%;
            height: 100%;
            background: #000;
            overflow: hidden;
        }

        /*
         * Screen rotated 270° (right side down).
         * Stage is width=100vh × height=100vw, then rotated to fill the physical screen.
         */
        #stage {
            position: fixed;
            top: 50%;
            left: 50%;
            width: 100vh;
            height: 100vw;
            transform: translate(-50%, -50%) rotate(270deg);
            display: flex;
            flex-direction: column;
        }

        /* ── Top accent bar ── */
        #top-bar {
            flex: 0 0 5%;
            background: linear-gradient(135deg, #4EC96A 0%, #3BB85A 100%);
            display: flex;
            align-items: center;
            padding: 0 2.5%;
            gap: 1.5%;
        }
        #top-bar .line {
            height: 3px;
            flex: 1;
            background: rgba(255,255,255,0.35);
            border-radius: 2px;
        }
        #top-bar .dot {
            width: 8px; height: 8px;
            border-radius: 50%;
            background: rgba(255,255,255,0.6);
            flex-shrink: 0;
        }

        /* ── Slides area ── */
        #slides-area {
            flex: 1;
            position: relative;
            background: #111;
        }

        .slide {
            position: absolute;
            inset: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            opacity: 0;
            transition: opacity 1s ease-in-out;
        }
        .slide.active { opacity: 1; }

        .slide img, .slide video, .slide canvas {
            width: 100%;
            height: 100%;
            object-fit: fill;
        }

        /* ── Bottom bar with logo ── */
        #bottom-bar {
            flex: 0 0 8%;
            background: #fff;
            display: flex;
            align-items: center;
            justify-content: flex-start;
            padding: 0 3%;
            border-top: 3px solid #4EC96A;
        }
        #bottom-bar img#logo {
            height: 55%;
            width: auto;
            object-fit: contain;
        }

        /* Progress bar sits inside the green top bar */
        #progress {
            position: absolute;
            bottom: 0;
            left: 0;
            height: 3px;
            background: rgba(255,255,255,0.6);
            width: 0%;
        }

        .pdf-loading {
            position: absolute;
            inset: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            color: rgba(255,255,255,0.25);
            font-family: sans-serif;
            font-size: 1.1em;
        }
    </style>
</head>
<body>
    <div id="stage">
        <div id="top-bar">
            <div class="dot"></div>
            <div class="line"></div>
            <div class="dot"></div>
            <div class="line"></div>
            <div class="dot"></div>
        </div>

        <div id="slides-area">
            <div id="progress"></div>
        </div>

        <div id="bottom-bar">
            <img id="logo" src="Logo_official_eng.png" alt="Tel-Hai">
        </div>
    </div>

    <script>
    // ================================================================
    // CONFIGURATION
    // ================================================================
    const CONFIG = {
        defaultImageDuration: 10,   // seconds each image/PDF is shown
        loop:    true,
        shuffle: false,
    };

    // ================================================================
    // SLIDES LIST
    //
    // Image:  { src: 'media/poster.jpg' }
    // PDF:    { src: 'media/poster.pdf' }
    //         { src: 'media/poster.pdf', duration: 15 }   ← custom seconds
    // Video:  { src: 'media/clip.mp4' }   ← plays to end, then advances
    // ================================================================
    const SLIDES = [
        { src: 'media/Poster Migal-Gili Nachmani.pdf' },
        { src: 'media/Poster for IMTF2022_Loai Basheer_Final.pdf' },
        { src: 'media/WhatsApp Video 2026-06-15 at 11.15.57.mp4' },
        { src: 'media/Poster_Or Tagar_May2025.pdf' },
        { src: 'media/Poster_FOP-2021_Sandip.pdf' },
        { src: 'media/WhatsApp Video 2026-06-15 at 11.13.30.mp4' },
        { src: 'media/poster Pangboern 2019 - ofir benjamin.pdf' },
    ];

    // ================================================================
    // ENGINE
    // ================================================================
    // Disable Worker for maximum signage browser compatibility
    pdfjsLib.GlobalWorkerOptions.workerSrc = '';

    const slidesArea = document.getElementById('slides-area');
    const progress   = document.getElementById('progress');

    function fileType(src) {
        if (/\.(mp4|webm|ogg|mov)$/i.test(src)) return 'video';
        if (/\.pdf$/i.test(src))                 return 'pdf';
        return 'image';
    }

    const list = CONFIG.shuffle ? [...SLIDES].sort(() => Math.random() - 0.5) : SLIDES;
    const slideEls = [];
    let current = 0;
    let timer   = null;

    // Tracks in-progress renders so multiple callers share the same Promise
    const renderPromises = new Map();

    function renderPDF(src, container) {
        if (renderPromises.has(container)) return renderPromises.get(container);

        const p = (async () => {
            const loadingEl = container.querySelector('.pdf-loading');
            try {
                const pdf  = await pdfjsLib.getDocument(src).promise;
                const page = await pdf.getPage(1);

                const baseVP = page.getViewport({ scale: 1 });
                const W = slidesArea.offsetWidth  || window.innerHeight;
                const H = slidesArea.offsetHeight || window.innerWidth;
                const scale = Math.min(W / baseVP.width, H / baseVP.height) * (window.devicePixelRatio || 1);

                const viewport = page.getViewport({ scale });
                const canvas   = document.createElement('canvas');
                canvas.width   = viewport.width;
                canvas.height  = viewport.height;
                canvas.style.width     = '100%';
                canvas.style.height    = '100%';
                canvas.style.objectFit = 'contain';

                await page.render({ canvasContext: canvas.getContext('2d'), viewport }).promise;

                if (loadingEl) loadingEl.remove();
                container.appendChild(canvas);
            } catch (e) {
                console.error('PDF render failed:', e);
                // Skip to next slide on error instead of getting stuck
                if (loadingEl) loadingEl.remove();
                next();
            }
        })();

        renderPromises.set(container, p);
        return p;
    }

    function buildSlides() {
        list.forEach((slide, i) => {
            const div  = document.createElement('div');
            div.className = 'slide';
            const type = fileType(slide.src);
            div.dataset.type     = type;
            div.dataset.duration = slide.duration ?? CONFIG.defaultImageDuration;

            if (type === 'video') {
                const vid = document.createElement('video');
                vid.src         = slide.src;
                vid.muted       = true;
                vid.playsInline = true;
                vid.preload     = 'metadata';
                div.appendChild(vid);

            } else if (type === 'pdf') {
                const loader = document.createElement('div');
                loader.className   = 'pdf-loading';
                loader.textContent = 'Loading…';
                div.appendChild(loader);
                if (i < 2) renderPDF(slide.src, div);

            } else {
                const img   = document.createElement('img');
                img.src     = slide.src;
                img.alt     = '';
                img.loading = i === 0 ? 'eager' : 'lazy';
                div.appendChild(img);
            }

            slidesArea.appendChild(div);
            slideEls.push(div);
        });
    }

    function showSlide(index) {
        if (!slideEls.length) return;

        slideEls.forEach(el => {
            el.classList.remove('active');
            const v = el.querySelector('video');
            if (v) { v.pause(); v.onended = null; }
        });
        clearTimeout(timer);
        progress.style.transition = 'none';
        progress.style.width = '0%';

        current = ((index % slideEls.length) + slideEls.length) % slideEls.length;
        const el = slideEls[current];

        if (el.dataset.type === 'pdf' && !el.querySelector('canvas')) {
            renderPDF(list[current].src, el).then(() => el.classList.add('active'));
        } else {
            el.classList.add('active');
        }

        // Pre-render next PDF
        const nextIdx = (current + 1) % slideEls.length;
        const nextEl  = slideEls[nextIdx];
        if (nextEl.dataset.type === 'pdf' && !nextEl.querySelector('canvas')) {
            renderPDF(list[nextIdx].src, nextEl);
        }

        if (el.dataset.type === 'video') {
            const vid = el.querySelector('video');
            vid.currentTime = 0;
            vid.play().catch(() => next()); // autoplay blocked → skip
            vid.onended = next;
            timer = setTimeout(next, 60000); // safety: max 60s per video
        } else {
            const dur = parseFloat(el.dataset.duration);
            requestAnimationFrame(() => {
                progress.style.transition = `width ${dur}s linear`;
                progress.style.width = '100%';
            });
            timer = setTimeout(next, dur * 1000);
        }
    }

    function next() {
        const n = (current + 1) % slideEls.length;
        if (n === 0 && !CONFIG.loop) return;
        showSlide(n);
    }

    document.addEventListener('keydown', e => {
        if (e.key === 'ArrowRight' || e.key === ' ')  next();
        if (e.key === 'ArrowLeft')                    showSlide(current - 1);
        if (e.key === 'f' || e.key === 'F')           document.documentElement.requestFullscreen?.();
    });
    document.addEventListener('click', next);

    buildSlides();
    showSlide(0);
    </script>
</body>
</html>
