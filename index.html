<!DOCTYPE html>
<html lang="he">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>View Left</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        html, body {
            width: 100%;
            height: 100%;
            background: #000;
            overflow: hidden;
        }

        #stage {
            position: fixed;
            top: 50%;
            left: 50%;
            width: 100vh;
            height: 100vw;
            transform: translate(-50%, -50%) rotate(270deg);
            display: flex;
            flex-direction: column;
        }

        /* ── Top accent bar ── */
        #top-bar {
            flex: 0 0 5%;
            background: linear-gradient(135deg, #4EC96A 0%, #3BB85A 100%);
            display: flex;
            align-items: center;
            padding: 0 2.5%;
            gap: 1.5%;
        }
        #top-bar .line {
            height: 3px;
            flex: 1;
            background: rgba(255,255,255,0.35);
            border-radius: 2px;
        }
        #top-bar .dot {
            width: 8px; height: 8px;
            border-radius: 50%;
            background: rgba(255,255,255,0.6);
            flex-shrink: 0;
        }

        /* ── Slides area ── */
        #slides-area {
            flex: 1;
            position: relative;
            background: #111;
        }

        .slide {
            position: absolute;
            top: 6px;   /* small gap below the green bar */
            left: 0;
            right: 0;
            bottom: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            opacity: 0;
            transition: opacity 1s ease-in-out;
        }
        .slide.active { opacity: 1; }

        .slide img {
            width: 100%;
            height: 100%;
            object-fit: fill;
        }

        /* Videos: default style; JS may override for landscape-stored files */
        .slide video {
            width: 100%;
            height: 100%;
            object-fit: fill;
        }

        /* ── Bottom bar with logo ── */
        #bottom-bar {
            flex: 0 0 7%;
            background: #fff;
            display: flex;
            align-items: center;
            justify-content: flex-start;
            padding: 0 2%;
            border-top: 2px solid #4EC96A;
        }
        #bottom-bar img#logo {
            height: 50%;
            width: auto;
            object-fit: contain;
        }
    </style>
</head>
<body>
    <div id="stage">
        <div id="top-bar">
            <div class="dot"></div>
            <div class="line"></div>
            <div class="dot"></div>
            <div class="line"></div>
            <div class="dot"></div>
        </div>

        <div id="slides-area"></div>

        <div id="bottom-bar">
            <img id="logo" src="Logo_official_eng.png" alt="Tel-Hai">
        </div>
    </div>

    <script>
    // ================================================================
    // CONFIGURATION
    // ================================================================
    var CONFIG = {
        defaultImageDuration: 10,
        loop:    true,
        shuffle: false,
    };

    // ================================================================
    // SLIDES LIST
    // Image: { src: 'media/poster.jpg' }
    //        { src: 'media/poster.jpg', duration: 15 }
    // Video: { src: 'media/clip.mp4' }  ← plays to end then advances
    // ================================================================
    var SLIDES = [
        { src: 'media/Poster Migal-Gili Nachmani.jpg' },
        { src: 'media/Poster for IMTF2022_Loai Basheer_Final.jpg' },
        { src: 'media/WhatsApp Video 2026-06-15 at 11.15.57.mp4' },
        { src: 'media/Poster_Or Tagar_May2025.jpg' },
        { src: 'media/Poster_FOP-2021_Sandip.jpg' },
        { src: 'media/WhatsApp Video 2026-06-15 at 11.13.30.mp4' },
        { src: 'media/poster Pangboern 2019 - ofir benjamin.jpg' },
    ];

    // ================================================================
    // ENGINE
    // ================================================================
    // Add ?signage to URL to enable signage mode (rotates videos 90°)
    var isSignage  = window.location.search.indexOf('signage') > -1;

    var slidesArea = document.getElementById('slides-area');
    var slideEls   = [];
    var current    = 0;
    var timer      = null;

    function isVideo(src) { return /\.(mp4|webm|ogg|mov)$/i.test(src); }

    var list = CONFIG.shuffle ? SLIDES.slice().sort(function() { return Math.random() - 0.5; }) : SLIDES;

    function buildSlides() {
        for (var i = 0; i < list.length; i++) {
            var slide = list[i];
            var div = document.createElement('div');
            div.className = 'slide';

            if (isVideo(slide.src)) {
                var vid = document.createElement('video');
                vid.src = slide.src;
                vid.muted = true;
                vid.setAttribute('playsinline', '');
                vid.preload = 'metadata';
                div.setAttribute('data-type', 'video');

                // In signage mode: apply rotation to correct for missing metadata support
                if (isSignage) {
                    vid.style.transform = 'rotate(-90deg)';
                }

                div.appendChild(vid);
            } else {
                var img = document.createElement('img');
                img.src = slide.src;
                img.alt = '';
                img.loading = i === 0 ? 'eager' : 'lazy';
                div.setAttribute('data-type', 'image');
                var dur = (slide.duration != null) ? slide.duration : CONFIG.defaultImageDuration;
                div.setAttribute('data-duration', dur);
                div.appendChild(img);
            }

            slidesArea.appendChild(div);
            slideEls.push(div);
        }
    }

    function showSlide(index) {
        if (!slideEls.length) return;

        for (var j = 0; j < slideEls.length; j++) {
            slideEls[j].classList.remove('active');
            var v = slideEls[j].querySelector('video');
            if (v) { v.pause(); v.onended = null; }
        }
        clearTimeout(timer);

        current = ((index % slideEls.length) + slideEls.length) % slideEls.length;
        var el = slideEls[current];
        el.classList.add('active');

        if (el.getAttribute('data-type') === 'video') {
            var vid = el.querySelector('video');
            vid.currentTime = 0;
            vid.play()['catch'](function() { next(); });
            vid.onended = next;
            timer = setTimeout(next, 60000);
        } else {
            var dur = parseFloat(el.getAttribute('data-duration'));
            var img = el.querySelector('img');
            function startTimer() {
                timer = setTimeout(next, dur * 1000);
            }
            if (img && !img.complete) {
                img.onload  = startTimer;
                img.onerror = function() { next(); };
            } else {
                startTimer();
            }
        }
    }

    function next() {
        var n = (current + 1) % slideEls.length;
        if (n === 0 && !CONFIG.loop) return;
        showSlide(n);
    }

    document.addEventListener('keydown', function(e) {
        if (e.key === 'ArrowRight' || e.key === ' ')  next();
        if (e.key === 'ArrowLeft')  showSlide(current - 1);
        if (e.key === 'f' || e.key === 'F') {
            if (document.documentElement.requestFullscreen) {
                document.documentElement.requestFullscreen();
            }
        }
    });
    document.addEventListener('click', next);

    buildSlides();
    showSlide(0);
    </script>
</body>
</html>
