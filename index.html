<!DOCTYPE html>
<html lang="he">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>View Left</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        html, body {
            width: 100%;
            height: 100%;
            background: #000;
            overflow: hidden;
        }

        /*
         * Screen rotated 270° (right side down).
         * Stage is width=100vh × height=100vw, then rotated to fill the physical screen.
         */
        #stage {
            position: fixed;
            top: 50%;
            left: 50%;
            width: 100vh;
            height: 100vw;
            transform: translate(-50%, -50%) rotate(270deg);
            display: flex;
            flex-direction: column;
        }

        /* ── Top accent bar ── */
        #top-bar {
            flex: 0 0 5%;
            background: linear-gradient(135deg, #4EC96A 0%, #3BB85A 100%);
            display: flex;
            align-items: center;
            padding: 0 2.5%;
            gap: 1.5%;
        }
        #top-bar .line {
            height: 3px;
            flex: 1;
            background: rgba(255,255,255,0.35);
            border-radius: 2px;
        }
        #top-bar .dot {
            width: 8px; height: 8px;
            border-radius: 50%;
            background: rgba(255,255,255,0.6);
            flex-shrink: 0;
        }

        /* ── Slides area ── */
        #slides-area {
            flex: 1;
            position: relative;
            background: #111;
        }

        .slide {
            position: absolute;
            inset: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            opacity: 0;
            transition: opacity 1s ease-in-out;
        }
        .slide.active { opacity: 1; }

        .slide img, .slide video, .slide canvas {
            width: 100%;
            height: 100%;
            object-fit: fill;
        }

        /* ── Bottom bar with logo ── */
        #bottom-bar {
            flex: 0 0 7%;
            background: #fff;
            display: flex;
            align-items: center;
            justify-content: flex-start;
            padding: 0 2%;
            border-top: 2px solid #4EC96A;
        }
        #bottom-bar img#logo {
            height: 50%;
            width: auto;
            object-fit: contain;
        }

        /* Progress bar sits inside the green top bar */
        #progress {
            position: absolute;
            bottom: 0;
            left: 0;
            height: 3px;
            background: rgba(255,255,255,0.6);
            width: 0%;
        }

    </style>
</head>
<body>
    <div id="stage">
        <div id="top-bar">
            <div class="dot"></div>
            <div class="line"></div>
            <div class="dot"></div>
            <div class="line"></div>
            <div class="dot"></div>
        </div>

        <div id="slides-area">
            <div id="progress"></div>
        </div>

        <div id="bottom-bar">
            <img id="logo" src="Logo_official_eng.png" alt="Tel-Hai">
        </div>
    </div>

    <script>
    // ================================================================
    // CONFIGURATION
    // ================================================================
    const CONFIG = {
        defaultImageDuration: 10,   // seconds each image/PDF is shown
        loop:    true,
        shuffle: false,
    };

    // ================================================================
    // SLIDES LIST
    //
    // Image:  { src: 'media/poster.jpg' }
    // PDF:    { src: 'media/poster.pdf' }
    //         { src: 'media/poster.pdf', duration: 15 }   ← custom seconds
    // Video:  { src: 'media/clip.mp4' }   ← plays to end, then advances
    // ================================================================
    const SLIDES = [
        { src: 'media/Poster Migal-Gili Nachmani.jpg' },
        { src: 'media/Poster for IMTF2022_Loai Basheer_Final.jpg' },
        { src: 'media/WhatsApp Video 2026-06-15 at 11.15.57.mp4' },
        { src: 'media/Poster_Or Tagar_May2025.jpg' },
        { src: 'media/Poster_FOP-2021_Sandip.jpg' },
        { src: 'media/WhatsApp Video 2026-06-15 at 11.13.30.mp4' },
        { src: 'media/poster Pangboern 2019 - ofir benjamin.jpg' },
    ];

    // ================================================================
    // ENGINE
    // ================================================================
    const slidesArea = document.getElementById('slides-area');
    const progress   = document.getElementById('progress');

    function isVideo(src) { return /\.(mp4|webm|ogg|mov)$/i.test(src); }

    const list = CONFIG.shuffle ? [...SLIDES].sort(() => Math.random() - 0.5) : SLIDES;
    const slideEls = [];
    let current = 0;
    let timer   = null;

    function buildSlides() {
        list.forEach((slide, i) => {
            const div = document.createElement('div');
            div.className = 'slide';

            if (isVideo(slide.src)) {
                const vid = document.createElement('video');
                vid.src         = slide.src;
                vid.muted       = true;
                vid.playsInline = true;
                vid.preload     = 'metadata';
                div.dataset.type = 'video';
                div.appendChild(vid);
            } else {
                const img   = document.createElement('img');
                img.src     = slide.src;
                img.alt     = '';
                img.loading = i === 0 ? 'eager' : 'lazy';
                div.dataset.type     = 'image';
                div.dataset.duration = slide.duration ?? CONFIG.defaultImageDuration;
                div.appendChild(img);
            }

            slidesArea.appendChild(div);
            slideEls.push(div);
        });
    }

    function showSlide(index) {
        if (!slideEls.length) return;

        slideEls.forEach(el => {
            el.classList.remove('active');
            const v = el.querySelector('video');
            if (v) { v.pause(); v.onended = null; }
        });
        clearTimeout(timer);
        progress.style.transition = 'none';
        progress.style.width = '0%';

        current = ((index % slideEls.length) + slideEls.length) % slideEls.length;
        const el = slideEls[current];
        el.classList.add('active');

        if (el.dataset.type === 'video') {
            const vid = el.querySelector('video');
            vid.currentTime = 0;
            vid.play().catch(() => next());
            vid.onended = next;
            timer = setTimeout(next, 60000);
        } else {
            const dur = parseFloat(el.dataset.duration);
            const img = el.querySelector('img');
            const startTimer = () => {
                requestAnimationFrame(() => {
                    progress.style.transition = `width ${dur}s linear`;
                    progress.style.width = '100%';
                });
                timer = setTimeout(next, dur * 1000);
            };
            // Wait for image to load before starting the countdown
            if (img && !img.complete) {
                img.onload  = startTimer;
                img.onerror = next; // broken image → skip
            } else {
                startTimer();
            }
        }
    }

    function next() {
        const n = (current + 1) % slideEls.length;
        if (n === 0 && !CONFIG.loop) return;
        showSlide(n);
    }

    document.addEventListener('keydown', e => {
        if (e.key === 'ArrowRight' || e.key === ' ')  next();
        if (e.key === 'ArrowLeft')                    showSlide(current - 1);
        if (e.key === 'f' || e.key === 'F')           document.documentElement.requestFullscreen?.();
    });
    document.addEventListener('click', next);

    buildSlides();
    showSlide(0);
    </script>
</body>
</html>
