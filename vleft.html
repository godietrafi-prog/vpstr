<!DOCTYPE html>
<html lang="he">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="refresh" content="300">
    <title>View Left</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@300;400&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        html, body {
            width: 100%;
            height: 100%;
            background: #000;
            overflow: hidden;
        }

        #stage {
            position: fixed;
            top: 50%;
            left: 50%;
            width: 100vh;
            height: 100vw;
            transform: translate(-50%, -50%) rotate(270deg);
            display: flex;
            flex-direction: column;
        }

        /* ── Top accent bar ── */
        #top-bar {
            flex: 0 0 5%;
            background: linear-gradient(135deg, #4EC96A 0%, #3BB85A 100%);
            display: flex;
            align-items: center;
            padding: 0 2.5%;
            gap: 1.5%;
        }
        #top-bar .line {
            height: 3px;
            flex: 1;
            background: rgba(255,255,255,0.35);
            border-radius: 2px;
        }
        #top-bar .dot {
            width: 8px; height: 8px;
            border-radius: 50%;
            background: rgba(255,255,255,0.6);
            flex-shrink: 0;
        }

        /* ── Slides area ── */
        #slides-area {
            flex: 1;
            position: relative;
            background: #111;
        }

        .slide {
            position: absolute;
            top: 6px;
            left: 0;
            right: 0;
            bottom: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            opacity: 0;
            transition: opacity 1s ease-in-out;
        }
        .slide.active { opacity: 1; }

        .slide img, .slide video {
            width: 100%;
            height: 100%;
            object-fit: fill;
        }

        /* ── RSS card full-screen slides ── */
        .rss-card {
            background: linear-gradient(155deg, #071422 0%, #0e2d1c 55%, #071422 100%);
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            justify-content: flex-start;
            align-items: flex-start;
            padding: 6% 9% 0 9%;
            gap: 0;
            overflow: hidden;
        }
        .rss-card-quote {
            font-family: Georgia, serif;
            font-size: 7em;
            color: rgba(78, 201, 106, 0.13);
            line-height: 0.75;
            margin-bottom: -0.1em;
            margin-left: -0.05em;
            flex-shrink: 0;
            user-select: none;
        }
        .rss-card-badge {
            display: inline-flex;
            align-items: center;
            background: rgba(78, 201, 106, 0.12);
            border: 1.5px solid #4EC96A;
            color: #4EC96A;
            font-family: Arial, sans-serif;
            font-size: 1em;
            font-weight: bold;
            padding: 0.3em 1.1em;
            border-radius: 2em;
            letter-spacing: 0.07em;
            text-transform: uppercase;
            margin-bottom: 3.5%;
            flex-shrink: 0;
        }
        .rss-card-title {
            font-family: Georgia, 'Times New Roman', serif;
            font-size: 2.5em;
            color: #ffffff;
            line-height: 1.2;
            font-weight: bold;
            margin-bottom: 3%;
            flex-shrink: 0;
        }
        /* Authors + date on one line, below title */
        .rss-card-meta {
            width: 100%;
            display: flex;
            align-items: center;
            gap: 2.5%;
            border-top: 1px solid rgba(78, 201, 106, 0.25);
            padding-top: 2.5%;
            margin-bottom: 3%;
            flex-shrink: 0;
        }
        .rss-card-authors {
            font-family: Arial, sans-serif;
            font-size: 1.05em;
            color: #5a9a6a;
            font-style: italic;
            flex: 1;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }
        .rss-card-date {
            font-family: Arial, sans-serif;
            font-size: 1em;
            color: #4EC96A;
            font-weight: bold;
            flex-shrink: 0;
            white-space: nowrap;
        }
        /* Abstract below meta */
        .rss-card-abstract {
            font-family: Arial, sans-serif;
            font-size: 1.15em;
            color: #a0c8b0;
            line-height: 1.6;
            margin-bottom: 3%;
            flex-shrink: 1;
            overflow: hidden;
            display: -webkit-box;
            -webkit-line-clamp: 15;
            -webkit-box-orient: vertical;
        }
        /* Figure fills remaining vertical space at the bottom */
        .rss-card-figure {
            flex: 1;
            min-height: 0;
            width: calc(100% + 18%);
            margin-left: -9%;
            position: relative;
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #020c14;
        }
        .rss-card-figure::before {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0;
            height: 40%;
            background: linear-gradient(to bottom, #071422 0%, rgba(7,20,34,0) 100%);
            z-index: 1;
            pointer-events: none;
        }
        .rss-card-figure img {
            max-width: 100%;
            max-height: 100%;
            object-fit: contain;
            object-position: center;
            opacity: 0.92;
        }

        /* ── Dual compact card slide (two articles, no abstract/image) ── */
        .rss-dual {
            background: linear-gradient(155deg, #071422 0%, #0e2d1c 55%, #071422 100%);
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            padding: 5% 9% 4% 9%;
            overflow: hidden;
        }
        .rss-compact {
            flex: 1;
            min-height: 0;
            display: flex;
            flex-direction: column;
            justify-content: flex-start;
            padding-top: 5%;
            padding-left: 5%;
            border-left: 3px solid rgba(78, 201, 106, 0.4);
        }
        .rss-compact--second {
            border-top: 1px solid rgba(78, 201, 106, 0.18);
            margin-top: 4%;
            padding-top: 4%;
        }
        .rss-compact-badge {
            display: inline-flex;
            align-items: center;
            background: rgba(78, 201, 106, 0.10);
            border: 1px solid rgba(78, 201, 106, 0.6);
            color: #4EC96A;
            font-family: Arial, sans-serif;
            font-size: 0.82em;
            font-weight: bold;
            padding: 0.2em 0.9em;
            border-radius: 2em;
            letter-spacing: 0.06em;
            text-transform: uppercase;
            margin-bottom: 2%;
            flex-shrink: 0;
        }
        .rss-compact-title {
            font-family: Georgia, 'Times New Roman', serif;
            font-size: 1.85em;
            color: #ffffff;
            line-height: 1.2;
            font-weight: bold;
            margin-bottom: 2%;
            flex-shrink: 0;
            overflow: hidden;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
        }
        .rss-compact-meta {
            display: flex;
            align-items: center;
            gap: 2.5%;
            flex-shrink: 0;
        }
        .rss-compact-authors {
            font-family: Arial, sans-serif;
            font-size: 0.9em;
            color: #5a9a6a;
            font-style: italic;
            flex: 1;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }
        .rss-compact-date {
            font-family: Arial, sans-serif;
            font-size: 0.85em;
            color: #4EC96A;
            font-weight: bold;
            flex-shrink: 0;
            white-space: nowrap;
        }

        /* ── Clock in bottom bar ── */
        #clock-digits {
            font-family: 'Orbitron', 'Courier New', monospace;
            font-size: 1.5em;
            font-weight: 400;
            letter-spacing: 0.1em;
            color: #2e8b47;
            white-space: nowrap;
        }
        #clock-sep {
            display: inline-block;
            animation: sep-pulse 2s ease-in-out infinite;
        }
        @keyframes sep-pulse {
            0%, 100% { opacity: 1; }
            50%       { opacity: 0.2; }
        }

        /* ── News ticker ── */
        #news-ticker {
            flex: 0 0 6%;
            background: #0d1b2a;
            display: flex;
            align-items: center;
            overflow: hidden;
            border-top: 2px solid rgba(78,201,106,0.5);
        }
        #ticker-label {
            flex-shrink: 0;
            background: #4EC96A;
            color: #fff;
            font-family: Arial, sans-serif;
            font-size: 1.15em;
            font-weight: bold;
            padding: 0 1.5%;
            height: 100%;
            display: flex;
            align-items: center;
            white-space: nowrap;
            letter-spacing: 0.04em;
        }
        #ticker-scroll {
            flex: 1;
            overflow: hidden;
            height: 100%;
            position: relative;
        }
        #ticker-inner {
            position: absolute;
            top: 50%;
            left: 0;
            white-space: nowrap;
            font-family: Arial, sans-serif;
            font-size: 1.5em;
            color: #c8f5d6;
            padding-left: 100%;
            transform: translateY(-50%);
            will-change: transform;
        }
        @keyframes ticker-move {
            from { transform: translateY(-50%) translateX(0); }
            to   { transform: translateY(-50%) translateX(-100%); }
        }

        /* ── Bottom bar with logo ── */
        #bottom-bar {
            flex: 0 0 7%;
            background: #fff;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 2%;
            border-top: 2px solid #4EC96A;
        }
        #bottom-bar img#logo {
            height: 50%;
            width: auto;
            object-fit: contain;
        }
    </style>
</head>
<body>
    <div id="stage">
        <div id="top-bar">
            <div class="dot"></div>
            <div class="line"></div>
            <div class="dot"></div>
            <div class="line"></div>
            <div class="dot"></div>
        </div>
        <div id="slides-area"></div>
        <div id="news-ticker">
            <div id="ticker-label">RESEARCH NEWS</div>
            <div id="ticker-scroll"><div id="ticker-inner">Loading headlines...</div></div>
        </div>
        <div id="bottom-bar">
            <img id="logo" src="Logo_official_eng.png" alt="Tel-Hai">
            <div id="clock-digits">
                <span id="clock-hh">00</span><span id="clock-sep">:</span><span id="clock-mm">00</span>
            </div>
        </div>
    </div>

    <script>
    // ================================================================
    // CONFIGURATION
    // ================================================================
    var CONFIG = {
        posterDuration:  45,   // seconds for research posters
        imageDuration:    7,   // seconds for regular images
        rssCardDuration: 45,   // seconds for RSS full-screen cards
        rssMaxPerFeed:    3,   // how many articles to take from each feed
        loop: true
    };

    // news.json is generated every 2h by GitHub Actions (scripts/fetch_news.py)
    // — no CORS issues, same-origin fetch
    var NEWS_JSON = 'news.json';

    // ================================================================
    // ENGINE
    // ================================================================
    var slidesArea = document.getElementById('slides-area');
    var pool     = [];   // items from slides.json + rss cards
    var poolEls  = [];   // one DOM element per pool item
    var playlist = [];
    var current  = 0;
    var timer    = null;

    function isVideo(src) { return /\.(mp4|webm|ogg|mov)$/i.test(src || ''); }

    function shuffle(arr) {
        var a = arr.slice();
        for (var i = a.length - 1; i > 0; i--) {
            var j = Math.floor(Math.random() * (i + 1));
            var t = a[i]; a[i] = a[j]; a[j] = t;
        }
        return a;
    }

    function stripHTML(html) {
        var d = document.createElement('div');
        d.innerHTML = html || '';
        return (d.textContent || d.innerText || '').replace(/\s+/g, ' ').trim();
    }

    function makeRSSDualSlide(div, card1, card2) {
        var wrap = document.createElement('div');
        wrap.className = 'rss-dual';
        [card1, card2].forEach(function(rssItem, idx) {
            if (!rssItem) return;
            var cardEl = document.createElement('div');
            cardEl.className = 'rss-compact' + (idx === 1 ? ' rss-compact--second' : '');
            var badgeEl = document.createElement('div');
            badgeEl.className   = 'rss-compact-badge';
            badgeEl.textContent = rssItem.feedName;
            cardEl.appendChild(badgeEl);
            var titleEl = document.createElement('div');
            titleEl.className   = 'rss-compact-title';
            titleEl.textContent = rssItem.title;
            cardEl.appendChild(titleEl);
            if (rssItem.authors || rssItem.published) {
                var metaEl = document.createElement('div');
                metaEl.className = 'rss-compact-meta';
                if (rssItem.authors) {
                    var authEl = document.createElement('span');
                    authEl.className   = 'rss-compact-authors';
                    authEl.textContent = rssItem.authors;
                    metaEl.appendChild(authEl);
                }
                if (rssItem.published) {
                    var dateEl = document.createElement('span');
                    dateEl.className   = 'rss-compact-date';
                    dateEl.textContent = rssItem.published;
                    metaEl.appendChild(dateEl);
                }
                cardEl.appendChild(metaEl);
            }
            wrap.appendChild(cardEl);
        });
        div.appendChild(wrap);
    }

    // Every round: 2 posters → 1 rss slide (rich or dual), every 3 → 1 image
    function buildPlaylist() {
        var byType = {};
        for (var i = 0; i < pool.length; i++) {
            var t = pool[i].type || 'poster';
            if (!byType[t]) byType[t] = [];
            byType[t].push(i);
        }
        var posters  = shuffle(byType['poster']   || []);
        var images   = shuffle(byType['image']    || []);
        var videos   = shuffle(byType['video']    || []);
        // Rich cards (full slide) + dual slides (two compact) interleave equally
        var rssCards = shuffle((byType['rss_card'] || []).concat(byType['rss_dual'] || []));

        var pl = [];
        var ii = 0, ri = 0, vi = 0;
        for (var pi = 0; pi < posters.length; pi++) {
            pl.push(posters[pi]);
            if ((pi + 1) % 2 === 0 && ri < rssCards.length) pl.push(rssCards[ri++]);
            if ((pi + 1) % 3 === 0 && ii < images.length)   pl.push(images[ii++]);
            if ((pi + 1) % 3 === 0 && vi < videos.length)   pl.push(videos[vi++]);
        }
        // rssCards: do NOT dump remaining — they cycle naturally in the next round
        while (ii < images.length) pl.push(images[ii++]);
        while (vi < videos.length) pl.push(videos[vi++]);

        return pl.length > 0 ? pl : pool.map(function(_, i) { return i; });
    }

    function makeVideoSlide(div, src) {
        var vid = document.createElement('video');
        vid.src     = src;
        vid.muted   = true;
        vid.setAttribute('playsinline', '');
        vid.preload = 'auto';
        vid.style.width     = '100%';
        vid.style.height    = '100%';
        vid.style.objectFit = 'fill';
        div._vidEl = vid;
        div._start = function() {};
        div._stop  = function() {};
        div.appendChild(vid);
    }

    function makeRSSCardSlide(div, rssItem) {
        div.classList.add('rss-card');

        // Decorative quote mark
        var quoteEl = document.createElement('div');
        quoteEl.className   = 'rss-card-quote';
        quoteEl.textContent = '\u201C';
        div.appendChild(quoteEl);

        // Journal badge
        var badgeEl = document.createElement('div');
        badgeEl.className   = 'rss-card-badge';
        badgeEl.textContent = rssItem.feedName;
        div.appendChild(badgeEl);

        // Article title
        var titleEl = document.createElement('div');
        titleEl.className   = 'rss-card-title';
        titleEl.textContent = rssItem.title;
        div.appendChild(titleEl);

        // Meta line: authors + date
        if (rssItem.authors || rssItem.published) {
            var metaEl = document.createElement('div');
            metaEl.className = 'rss-card-meta';
            if (rssItem.authors) {
                var authEl = document.createElement('span');
                authEl.className   = 'rss-card-authors';
                authEl.textContent = rssItem.authors;
                metaEl.appendChild(authEl);
            }
            if (rssItem.published) {
                var dateEl = document.createElement('span');
                dateEl.className   = 'rss-card-date';
                dateEl.textContent = rssItem.published;
                metaEl.appendChild(dateEl);
            }
            div.appendChild(metaEl);
        }

        // Abstract (below meta)
        if (rssItem.abstract) {
            var absEl = document.createElement('div');
            absEl.className   = 'rss-card-abstract';
            absEl.textContent = rssItem.abstract;
            div.appendChild(absEl);
        }

        // Figure fills remaining vertical space at bottom
        if (rssItem.image) {
            var figDiv = document.createElement('div');
            figDiv.className = 'rss-card-figure';
            var imgEl = document.createElement('img');
            imgEl.src     = rssItem.image;
            imgEl.alt     = '';
            imgEl.loading = 'eager';
            imgEl.onerror = function() {
                this.parentElement.remove();  // 404 = no figure for this article
            };
            figDiv.appendChild(imgEl);
            div.appendChild(figDiv);
        }
    }

    function buildPool() {
        for (var i = 0; i < pool.length; i++) {
            var item = pool[i];
            var div  = document.createElement('div');
            div.className = 'slide';

            if (item.type === 'rss_card') {
                div.setAttribute('data-type', 'image');
                div.setAttribute('data-duration', String(item.duration || CONFIG.rssCardDuration));
                makeRSSCardSlide(div, item._rssItem);
            } else if (item.type === 'rss_dual') {
                div.setAttribute('data-type', 'image');
                div.setAttribute('data-duration', String(item.duration || CONFIG.rssCardDuration));
                makeRSSDualSlide(div, item._cards[0], item._cards[1]);
            } else if (isVideo(item.src)) {
                div.setAttribute('data-type', 'video');
                makeVideoSlide(div, item.src_left || item.src);
            } else {
                var img = document.createElement('img');
                img.src     = item.src;
                img.alt     = '';
                img.loading = 'eager';
                div.setAttribute('data-type', 'image');
                var dur = (item.duration != null) ? item.duration :
                          (item.type === 'poster' ? CONFIG.posterDuration : CONFIG.imageDuration);
                div.setAttribute('data-duration', String(dur));
                div.appendChild(img);
            }

            slidesArea.appendChild(div);
            poolEls.push(div);
        }
    }

    function showSlide(pos) {
        if (!pool.length) return;
        if (pos >= playlist.length) {
            if (!CONFIG.loop) return;
            playlist = buildPlaylist();
            pos = 0;
        }
        for (var j = 0; j < poolEls.length; j++) {
            poolEls[j].classList.remove('active');
            if (poolEls[j]._stop)   poolEls[j]._stop();
            if (poolEls[j]._vidEl) {
                poolEls[j]._vidEl.pause();
                poolEls[j]._vidEl.onended = null;
            }
        }
        clearTimeout(timer);

        current = pos;
        var el = poolEls[playlist[current]];
        el.classList.add('active');

        if (el.getAttribute('data-type') === 'video') {
            var vid = el._vidEl;
            vid.currentTime = 0;
            el._start();
            vid.play()['catch'](function() { next(); });
            vid.onended = function() { el._stop(); next(); };
            timer = setTimeout(function() { el._stop(); next(); }, 60000);
        } else {
            var dur = parseFloat(el.getAttribute('data-duration'));
            var img = el.querySelector('img');
            function startTimer() { timer = setTimeout(next, dur * 1000); }
            if (img && !img.complete) {
                img.onload  = startTimer;
                img.onerror = function() { next(); };
            } else {
                startTimer();
            }
        }
    }

    function next() { showSlide(current + 1); }

    document.addEventListener('keydown', function(e) {
        if (e.key === 'ArrowRight' || e.key === ' ')  next();
        if (e.key === 'ArrowLeft')  showSlide(current - 1);
        if (e.key === 'f' || e.key === 'F') {
            if (document.documentElement.requestFullscreen)
                document.documentElement.requestFullscreen();
        }
    });
    document.addEventListener('click', next);

    // ================================================================
    // RSS — shared fetch for both cards and ticker
    // ================================================================
    var tickerInner = document.getElementById('ticker-inner');
    var tickerScroll = document.getElementById('ticker-scroll');

    // Load news.json — classify as rich (full slide) or compact (two per slide)
    function rssFetchAll(callback) {
        var req = new XMLHttpRequest();
        req.open('GET', NEWS_JSON + '?v=' + Date.now());
        req.timeout = 8000;
        req.onload = function() {
            var rich = [], compact = [];
            try {
                var d = JSON.parse(req.responseText);
                (d.items || []).forEach(function(it) {
                    if (!it.title) return;
                    var rssItem = { title:     it.title,
                                    abstract:  it.abstract  || '',
                                    authors:   it.authors   || '',
                                    published: it.published || '',
                                    feedName:  it.feedName,
                                    image:     it.image     || '',
                                    screen:    it.screen    || 'both' };
                    if (rssItem.abstract || rssItem.image) {
                        rich.push({ type: 'rss_card', duration: CONFIG.rssCardDuration,
                                    _rssItem: rssItem });
                    } else {
                        compact.push(rssItem);
                    }
                });
            } catch(e) {}
            callback(rich);
        };
        req.onerror = req.ontimeout = function() { callback([]); };
        req.send();
    }

    function tickerBuild(rssItems) {
        var FALLBACK = [
            'Nature Food: Advancing sustainable food systems through science',
            'Food Chemistry: Novel analytical methods for food quality assessment',
            'Trends in Food Science: Innovation in food processing and safety',
            'Food Quality & Preference: Consumer science and sensory evaluation',
            'Metabolomics and multi-omics approaches in food research',
        ];
        var titles = [];
        rssItems.forEach(function(it) {
            if (it.type === 'rss_card') {
                var s = it._rssItem.screen || 'both';
                if (s === 'left' || s === 'both')
                    titles.push(it._rssItem.feedName + ':  ' + it._rssItem.title);
            }
            if (it.type === 'rss_dual') {
                it._cards.forEach(function(c) {
                    if (!c) return;
                    var s = c.screen || 'both';
                    if (s === 'left' || s === 'both')
                        titles.push(c.feedName + ':  ' + c.title);
                });
            }
        });
        if (!titles.length) titles = FALLBACK;
        var arr = shuffle(titles);
        var text = arr.join('   \u25C6   ');
        tickerInner.textContent = text;
        tickerInner.style.animation = 'none';
        tickerInner.getBoundingClientRect();
        var containerW = tickerScroll.offsetWidth || 800;
        var textW = text.length * 14; // ~14px per char at 1.5em
        var duration = Math.round((containerW + textW) / 80);
        tickerInner.style.animation = duration + 's ticker-move linear infinite';
    }

    // ================================================================
    // INIT — load slides.json, fetch RSS, then start
    // ================================================================
    var xhr = new XMLHttpRequest();
    xhr.open('GET', 'slides.json?v=' + Date.now());
    xhr.onload = function() {
        if (xhr.status === 200) {
            try {
                var data = JSON.parse(xhr.responseText);
                pool = data.pool || data;
            } catch(e) {}
        }
        rssFetchAll(function(rssItems) {
            rssItems.forEach(function(item) { pool.push(item); });
            buildPool();
            playlist = buildPlaylist();
            // Each screen starts at a random position → true independence
            showSlide(Math.floor(Math.random() * Math.max(1, playlist.length)));
            tickerBuild(rssItems);
        });
    };
    xhr.onerror = function() {
        buildPool();
        playlist = buildPlaylist();
        showSlide(0);
    };
    xhr.send();

    // ================================================================
    // CLOCK — fixed bottom-right, 24h HH:MM
    // ================================================================
    var clockHH = document.getElementById('clock-hh');
    var clockMM = document.getElementById('clock-mm');

    function updateClock() {
        var now = new Date();
        var h = String(now.getHours()).padStart(2, '0');
        var m = String(now.getMinutes()).padStart(2, '0');
        if (clockHH.textContent !== h) clockHH.textContent = h;
        if (clockMM.textContent !== m) clockMM.textContent = m;
        var msToNext = (60 - now.getSeconds()) * 1000 - now.getMilliseconds() + 50;
        setTimeout(updateClock, msToNext);
    }
    updateClock();

    </script>
</body>
</html>
