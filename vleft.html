<!DOCTYPE html>
<html lang="he">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="refresh" content="300">
    <title>View Left</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        html, body {
            width: 100%;
            height: 100%;
            background: #000;
            overflow: hidden;
        }

        #stage {
            position: fixed;
            top: 50%;
            left: 50%;
            width: 100vh;
            height: 100vw;
            transform: translate(-50%, -50%) rotate(270deg);
            display: flex;
            flex-direction: column;
        }

        /* ── Top accent bar ── */
        #top-bar {
            flex: 0 0 5%;
            background: linear-gradient(135deg, #4EC96A 0%, #3BB85A 100%);
            display: flex;
            align-items: center;
            padding: 0 2.5%;
            gap: 1.5%;
        }
        #top-bar .line {
            height: 3px;
            flex: 1;
            background: rgba(255,255,255,0.35);
            border-radius: 2px;
        }
        #top-bar .dot {
            width: 8px; height: 8px;
            border-radius: 50%;
            background: rgba(255,255,255,0.6);
            flex-shrink: 0;
        }

        /* ── Slides area ── */
        #slides-area {
            flex: 1;
            position: relative;
            background: #111;
        }

        .slide {
            position: absolute;
            top: 6px;
            left: 0;
            right: 0;
            bottom: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            opacity: 0;
            transition: opacity 1s ease-in-out;
        }
        .slide.active { opacity: 1; }

        .slide img, .slide video {
            width: 100%;
            height: 100%;
            object-fit: fill;
        }

        /* ── Bottom bar with logo ── */
        #bottom-bar {
            flex: 0 0 7%;
            background: #fff;
            display: flex;
            align-items: center;
            justify-content: flex-start;
            padding: 0 2%;
            border-top: 2px solid #4EC96A;
        }
        #bottom-bar img#logo {
            height: 50%;
            width: auto;
            object-fit: contain;
        }
    </style>
</head>
<body>
    <div id="stage">
        <div id="top-bar">
            <div class="dot"></div>
            <div class="line"></div>
            <div class="dot"></div>
            <div class="line"></div>
            <div class="dot"></div>
        </div>
        <div id="slides-area"></div>
        <div id="bottom-bar">
            <img id="logo" src="Logo_official_eng.png" alt="Tel-Hai">
        </div>
    </div>

    <script>
    // ================================================================
    // CONFIGURATION
    // ================================================================
    var CONFIG = {
        defaultImageDuration: 10,   // seconds for images/posters
        loop: true
    };

    // ================================================================
    // ENGINE
    // ================================================================
    var slidesArea = document.getElementById('slides-area');
    var pool    = [];   // items from slides.json pool
    var poolEls = [];   // one DOM element per pool item (indexed same as pool)
    var playlist = [];  // current round: array of pool indices
    var current  = 0;   // position in playlist
    var timer    = null;

    function isVideo(src) { return /\.(mp4|webm|ogg|mov)$/i.test(src); }

    function shuffle(arr) {
        var a = arr.slice();
        for (var i = a.length - 1; i > 0; i--) {
            var j = Math.floor(Math.random() * (i + 1));
            var t = a[i]; a[i] = a[j]; a[j] = t;
        }
        return a;
    }

    // Build a playlist that covers ALL items: every poster appears once per round.
    // Videos inserted every 3 posters, images every 4 posters.
    function buildPlaylist() {
        var byType = {};
        for (var i = 0; i < pool.length; i++) {
            var t = pool[i].type || 'poster';
            if (!byType[t]) byType[t] = [];
            byType[t].push(i);
        }

        var posters = shuffle(byType['poster'] || []);
        var videos  = shuffle(byType['video']  || []);
        var images  = shuffle(byType['image']  || []);

        var pl = [];
        var vi = 0, ii = 0;

        for (var pi = 0; pi < posters.length; pi++) {
            pl.push(posters[pi]);
            if ((pi + 1) % 3 === 0 && vi < videos.length) pl.push(videos[vi++]);
            if ((pi + 1) % 4 === 0 && ii < images.length) pl.push(images[ii++]);
        }
        while (vi < videos.length) pl.push(videos[vi++]);
        while (ii < images.length) pl.push(images[ii++]);

        return pl.length > 0 ? pl : pool.map(function(_, i) { return i; });
    }

    // ── Build a video slide ───────────────────────────────────────────
    // Videos must be pre-processed with process_video.bat before use.
    // process_video.bat applies FFmpeg transpose=1 (90° CW) so that:
    //   - On TV  (hardware overlay, no CSS rotation): 90° CW file + 90° CW screen = upright
    //   - On PC  (CSS 270° applied to video element): 270° CSS + 90° CW file = 360° = upright
    function makeVideoSlide(div, src) {
        var vid = document.createElement('video');
        vid.src     = src;
        vid.muted   = true;
        vid.setAttribute('playsinline', '');
        vid.preload = 'auto';
        vid.style.width     = '100%';
        vid.style.height    = '100%';
        vid.style.objectFit = 'fill';

        div._vidEl = vid;
        div._start = function() {};
        div._stop  = function() {};

        div.appendChild(vid);
    }

    // ── Build one DOM element per pool item ───────────────────────────
    function buildPool() {
        for (var i = 0; i < pool.length; i++) {
            var item = pool[i];
            var div  = document.createElement('div');
            div.className = 'slide';

            if (isVideo(item.src)) {
                div.setAttribute('data-type', 'video');
                makeVideoSlide(div, item.src);
            } else {
                var img = document.createElement('img');
                img.src     = item.src;
                img.alt     = '';
                img.loading = 'eager';
                div.setAttribute('data-type', 'image');
                var dur = (item.duration != null) ? item.duration : CONFIG.defaultImageDuration;
                div.setAttribute('data-duration', String(dur));
                div.appendChild(img);
            }

            slidesArea.appendChild(div);
            poolEls.push(div);
        }
    }

    // ── Show slide at position pos in the playlist ────────────────────
    function showSlide(pos) {
        if (!pool.length) return;

        // End of playlist → regenerate for next round
        if (pos >= playlist.length) {
            if (!CONFIG.loop) return;
            playlist = buildPlaylist();
            pos = 0;
        }

        // Deactivate + stop everything
        for (var j = 0; j < poolEls.length; j++) {
            poolEls[j].classList.remove('active');
            if (poolEls[j]._stop)   poolEls[j]._stop();
            if (poolEls[j]._vidEl) {
                poolEls[j]._vidEl.pause();
                poolEls[j]._vidEl.onended = null;
            }
        }
        clearTimeout(timer);

        current = pos;
        var el = poolEls[playlist[current]];
        el.classList.add('active');

        if (el.getAttribute('data-type') === 'video') {
            var vid = el._vidEl;
            vid.currentTime = 0;
            el._start();
            vid.play()['catch'](function() { next(); });
            vid.onended = function() { el._stop(); next(); };
            timer = setTimeout(function() { el._stop(); next(); }, 60000);
        } else {
            var dur = parseFloat(el.getAttribute('data-duration'));
            var img = el.querySelector('img');
            function startTimer() { timer = setTimeout(next, dur * 1000); }
            if (img && !img.complete) {
                img.onload  = startTimer;
                img.onerror = function() { next(); };
            } else {
                startTimer();
            }
        }
    }

    function next() { showSlide(current + 1); }

    document.addEventListener('keydown', function(e) {
        if (e.key === 'ArrowRight' || e.key === ' ')  next();
        if (e.key === 'ArrowLeft')  showSlide(current - 1);
        if (e.key === 'f' || e.key === 'F') {
            if (document.documentElement.requestFullscreen)
                document.documentElement.requestFullscreen();
        }
    });
    document.addEventListener('click', next);

    // ── Load pool from slides.json and start ──────────────────────────
    var xhr = new XMLHttpRequest();
    xhr.open('GET', 'slides.json?v=' + Date.now());
    xhr.onload = function() {
        if (xhr.status === 200) {
            var data = JSON.parse(xhr.responseText);
            pool = data.pool || data; // support both {pool:[...]} and legacy [...]
        }
        buildPool();
        playlist = buildPlaylist();
        showSlide(0);
    };
    xhr.onerror = function() { buildPool(); playlist = buildPlaylist(); showSlide(0); };
    xhr.send();

    </script>
</body>
</html>
