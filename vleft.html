<!DOCTYPE html>
<html lang="he">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="refresh" content="300">
    <title>View Left</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        html, body {
            width: 100%;
            height: 100%;
            background: #000;
            overflow: hidden;
        }

        #stage {
            position: fixed;
            top: 50%;
            left: 50%;
            width: 100vh;
            height: 100vw;
            transform: translate(-50%, -50%) rotate(270deg);
            display: flex;
            flex-direction: column;
        }

        /* ── Top accent bar ── */
        #top-bar {
            flex: 0 0 5%;
            background: linear-gradient(135deg, #4EC96A 0%, #3BB85A 100%);
            display: flex;
            align-items: center;
            padding: 0 2.5%;
            gap: 1.5%;
        }
        #top-bar .line {
            height: 3px;
            flex: 1;
            background: rgba(255,255,255,0.35);
            border-radius: 2px;
        }
        #top-bar .dot {
            width: 8px; height: 8px;
            border-radius: 50%;
            background: rgba(255,255,255,0.6);
            flex-shrink: 0;
        }

        /* ── Slides area ── */
        #slides-area {
            flex: 1;
            position: relative;
            background: #111;
        }

        .slide {
            position: absolute;
            top: 6px;
            left: 0;
            right: 0;
            bottom: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            opacity: 0;
            transition: opacity 1s ease-in-out;
        }
        .slide.active { opacity: 1; }

        .slide img, .slide video {
            width: 100%;
            height: 100%;
            object-fit: fill;
        }

        /* ── RSS card full-screen slides ── */
        .rss-card {
            background: linear-gradient(155deg, #071422 0%, #0e2d1c 55%, #071422 100%);
            flex-direction: column;
            justify-content: center;
            align-items: flex-start;
            padding: 5% 9% 4% 9%;
            gap: 0;
            overflow: hidden;
        }
        .rss-card-quote {
            font-family: Georgia, serif;
            font-size: 8em;
            color: rgba(78, 201, 106, 0.13);
            line-height: 0.75;
            margin-bottom: -0.12em;
            margin-left: -0.05em;
            flex-shrink: 0;
            user-select: none;
        }
        .rss-card-badge {
            display: inline-flex;
            align-items: center;
            background: rgba(78, 201, 106, 0.12);
            border: 1.5px solid #4EC96A;
            color: #4EC96A;
            font-family: Arial, sans-serif;
            font-size: 1em;
            font-weight: bold;
            padding: 0.3em 1.1em;
            border-radius: 2em;
            letter-spacing: 0.07em;
            text-transform: uppercase;
            margin-bottom: 4%;
            flex-shrink: 0;
        }
        .rss-card-title {
            font-family: Georgia, 'Times New Roman', serif;
            font-size: 2.6em;
            color: #ffffff;
            line-height: 1.2;
            font-weight: bold;
            margin-bottom: 4%;
            flex-shrink: 0;
        }
        .rss-card-summary {
            font-family: Arial, sans-serif;
            font-size: 1.2em;
            color: #a0c8b0;
            line-height: 1.65;
            margin-bottom: 5%;
            flex-shrink: 0;
            overflow: hidden;
            display: -webkit-box;
            -webkit-line-clamp: 4;
            -webkit-box-orient: vertical;
        }
        .rss-card-footer {
            width: 100%;
            display: flex;
            align-items: center;
            justify-content: space-between;
            border-top: 1px solid rgba(78, 201, 106, 0.25);
            padding-top: 3%;
            flex-shrink: 0;
            gap: 3%;
        }
        .rss-card-authors {
            font-family: Arial, sans-serif;
            font-size: 1.05em;
            color: #5a9a6a;
            font-style: italic;
            flex: 1;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }
        .rss-card-date {
            font-family: Arial, sans-serif;
            font-size: 1em;
            color: #4EC96A;
            font-weight: bold;
            flex-shrink: 0;
        }

        /* ── RSS card — figure panel (when og:image available) ── */
        .rss-card--has-image {
            flex-direction: row !important;
            padding: 0 !important;
            justify-content: flex-start !important;
            align-items: stretch !important;
        }
        .rss-card-text {
            flex: 0 0 60%;
            display: flex;
            flex-direction: column;
            justify-content: center;
            padding: 4% 5% 3% 8%;
            gap: 0;
        }
        .rss-card-figure {
            flex: 0 0 40%;
            position: relative;
            overflow: hidden;
            background: #020c14;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .rss-card-figure::before {
            content: '';
            position: absolute;
            inset: 0;
            background: linear-gradient(to right, #071422 0%, rgba(7,20,34,0.2) 20%, transparent 40%);
            z-index: 1;
            pointer-events: none;
        }
        .rss-card-figure img {
            width: 100%;
            height: 100%;
            object-fit: contain;
            object-position: center;
            opacity: 0.88;
        }

        /* ── News ticker ── */
        #news-ticker {
            flex: 0 0 6%;
            background: #0d1b2a;
            display: flex;
            align-items: center;
            overflow: hidden;
            border-top: 2px solid rgba(78,201,106,0.5);
        }
        #ticker-label {
            flex-shrink: 0;
            background: #4EC96A;
            color: #fff;
            font-family: Arial, sans-serif;
            font-size: 1.15em;
            font-weight: bold;
            padding: 0 1.5%;
            height: 100%;
            display: flex;
            align-items: center;
            white-space: nowrap;
            letter-spacing: 0.04em;
        }
        #ticker-scroll {
            flex: 1;
            overflow: hidden;
            height: 100%;
            position: relative;
        }
        #ticker-inner {
            position: absolute;
            top: 50%;
            left: 0;
            white-space: nowrap;
            font-family: Arial, sans-serif;
            font-size: 1.5em;
            color: #c8f5d6;
            padding-left: 100%;
            transform: translateY(-50%);
            will-change: transform;
        }
        @keyframes ticker-move {
            from { transform: translateY(-50%) translateX(0); }
            to   { transform: translateY(-50%) translateX(-100%); }
        }

        /* ── Bottom bar with logo ── */
        #bottom-bar {
            flex: 0 0 7%;
            background: #fff;
            display: flex;
            align-items: center;
            justify-content: flex-start;
            padding: 0 2%;
            border-top: 2px solid #4EC96A;
        }
        #bottom-bar img#logo {
            height: 50%;
            width: auto;
            object-fit: contain;
        }
    </style>
</head>
<body>
    <div id="stage">
        <div id="top-bar">
            <div class="dot"></div>
            <div class="line"></div>
            <div class="dot"></div>
            <div class="line"></div>
            <div class="dot"></div>
        </div>
        <div id="slides-area"></div>
        <div id="news-ticker">
            <div id="ticker-label">RESEARCH NEWS</div>
            <div id="ticker-scroll"><div id="ticker-inner">Loading headlines...</div></div>
        </div>
        <div id="bottom-bar">
            <img id="logo" src="Logo_official_eng.png" alt="Tel-Hai">
        </div>
    </div>

    <script>
    // ================================================================
    // CONFIGURATION
    // ================================================================
    var CONFIG = {
        posterDuration:  30,   // seconds for research posters
        imageDuration:    7,   // seconds for regular images
        rssCardDuration: 15,   // seconds for RSS full-screen cards
        rssMaxPerFeed:    3,   // how many articles to take from each feed
        loop: true
    };

    // news.json is generated every 2h by GitHub Actions (scripts/fetch_news.py)
    // — no CORS issues, same-origin fetch
    var NEWS_JSON = 'news.json';

    // ================================================================
    // ENGINE
    // ================================================================
    var slidesArea = document.getElementById('slides-area');
    var pool     = [];   // items from slides.json + rss cards
    var poolEls  = [];   // one DOM element per pool item
    var playlist = [];
    var current  = 0;
    var timer    = null;

    function isVideo(src) { return /\.(mp4|webm|ogg|mov)$/i.test(src || ''); }

    function shuffle(arr) {
        var a = arr.slice();
        for (var i = a.length - 1; i > 0; i--) {
            var j = Math.floor(Math.random() * (i + 1));
            var t = a[i]; a[i] = a[j]; a[j] = t;
        }
        return a;
    }

    function stripHTML(html) {
        var d = document.createElement('div');
        d.innerHTML = html || '';
        return (d.textContent || d.innerText || '').replace(/\s+/g, ' ').trim();
    }

    // Every round: 3 posters → 1 rss_card, every 4 posters → 1 image
    function buildPlaylist() {
        var byType = {};
        for (var i = 0; i < pool.length; i++) {
            var t = pool[i].type || 'poster';
            if (!byType[t]) byType[t] = [];
            byType[t].push(i);
        }
        var posters  = shuffle(byType['poster']   || []);
        var images   = shuffle(byType['image']    || []);
        var rssCards = shuffle(byType['rss_card'] || []);
        var videos   = shuffle(byType['video']    || []);

        var pl = [];
        var ii = 0, ri = 0, vi = 0;
        for (var pi = 0; pi < posters.length; pi++) {
            pl.push(posters[pi]);
            if ((pi + 1) % 2 === 0 && ri < rssCards.length) pl.push(rssCards[ri++]);
            if ((pi + 1) % 3 === 0 && ii < images.length)   pl.push(images[ii++]);
            if ((pi + 1) % 3 === 0 && vi < videos.length)   pl.push(videos[vi++]);
        }
        // rssCards: do NOT dump remaining — they cycle naturally in the next round
        while (ii < images.length) pl.push(images[ii++]);
        while (vi < videos.length) pl.push(videos[vi++]);

        return pl.length > 0 ? pl : pool.map(function(_, i) { return i; });
    }

    function makeVideoSlide(div, src) {
        var vid = document.createElement('video');
        vid.src     = src;
        vid.muted   = true;
        vid.setAttribute('playsinline', '');
        vid.preload = 'auto';
        vid.style.width     = '100%';
        vid.style.height    = '100%';
        vid.style.objectFit = 'fill';
        div._vidEl = vid;
        div._start = function() {};
        div._stop  = function() {};
        div.appendChild(vid);
    }

    function makeRSSCardSlide(div, rssItem) {
        div.classList.add('rss-card');

        // Target container: text wrapper (or div itself when no image)
        var target = div;
        if (rssItem.image) {
            div.classList.add('rss-card--has-image');
            target = document.createElement('div');
            target.className = 'rss-card-text';
        }

        var quoteEl = document.createElement('div');
        quoteEl.className   = 'rss-card-quote';
        quoteEl.textContent = '\u201C';

        var badgeEl = document.createElement('div');
        badgeEl.className   = 'rss-card-badge';
        badgeEl.textContent = rssItem.feedName;

        var titleEl = document.createElement('div');
        titleEl.className   = 'rss-card-title';
        titleEl.textContent = rssItem.title;

        target.appendChild(quoteEl);
        target.appendChild(badgeEl);
        target.appendChild(titleEl);

        if (rssItem.summary) {
            var summaryEl = document.createElement('div');
            summaryEl.className   = 'rss-card-summary';
            summaryEl.textContent = rssItem.summary;
            target.appendChild(summaryEl);
        }

        if (rssItem.authors || rssItem.published) {
            var footerEl = document.createElement('div');
            footerEl.className = 'rss-card-footer';
            if (rssItem.authors) {
                var authEl = document.createElement('div');
                authEl.className   = 'rss-card-authors';
                authEl.textContent = rssItem.authors;
                footerEl.appendChild(authEl);
            }
            if (rssItem.published) {
                var dateEl = document.createElement('div');
                dateEl.className   = 'rss-card-date';
                dateEl.textContent = rssItem.published;
                footerEl.appendChild(dateEl);
            }
            target.appendChild(footerEl);
        }

        if (rssItem.image) {
            div.appendChild(target);
            var figDiv = document.createElement('div');
            figDiv.className = 'rss-card-figure';
            var imgEl = document.createElement('img');
            imgEl.src     = rssItem.image;
            imgEl.alt     = '';
            imgEl.loading = 'eager';
            figDiv.appendChild(imgEl);
            div.appendChild(figDiv);
        }
    }

    function buildPool() {
        for (var i = 0; i < pool.length; i++) {
            var item = pool[i];
            var div  = document.createElement('div');
            div.className = 'slide';

            if (item.type === 'rss_card') {
                div.setAttribute('data-type', 'image');
                div.setAttribute('data-duration', String(item.duration || CONFIG.rssCardDuration));
                makeRSSCardSlide(div, item._rssItem);
            } else if (isVideo(item.src)) {
                div.setAttribute('data-type', 'video');
                makeVideoSlide(div, item.src_left || item.src);
            } else {
                var img = document.createElement('img');
                img.src     = item.src;
                img.alt     = '';
                img.loading = 'eager';
                div.setAttribute('data-type', 'image');
                var dur = (item.duration != null) ? item.duration :
                          (item.type === 'poster' ? CONFIG.posterDuration : CONFIG.imageDuration);
                div.setAttribute('data-duration', String(dur));
                div.appendChild(img);
            }

            slidesArea.appendChild(div);
            poolEls.push(div);
        }
    }

    function showSlide(pos) {
        if (!pool.length) return;
        if (pos >= playlist.length) {
            if (!CONFIG.loop) return;
            playlist = buildPlaylist();
            pos = 0;
        }
        for (var j = 0; j < poolEls.length; j++) {
            poolEls[j].classList.remove('active');
            if (poolEls[j]._stop)   poolEls[j]._stop();
            if (poolEls[j]._vidEl) {
                poolEls[j]._vidEl.pause();
                poolEls[j]._vidEl.onended = null;
            }
        }
        clearTimeout(timer);

        current = pos;
        var el = poolEls[playlist[current]];
        el.classList.add('active');

        if (el.getAttribute('data-type') === 'video') {
            var vid = el._vidEl;
            vid.currentTime = 0;
            el._start();
            vid.play()['catch'](function() { next(); });
            vid.onended = function() { el._stop(); next(); };
            timer = setTimeout(function() { el._stop(); next(); }, 60000);
        } else {
            var dur = parseFloat(el.getAttribute('data-duration'));
            var img = el.querySelector('img');
            function startTimer() { timer = setTimeout(next, dur * 1000); }
            if (img && !img.complete) {
                img.onload  = startTimer;
                img.onerror = function() { next(); };
            } else {
                startTimer();
            }
        }
    }

    function next() { showSlide(current + 1); }

    document.addEventListener('keydown', function(e) {
        if (e.key === 'ArrowRight' || e.key === ' ')  next();
        if (e.key === 'ArrowLeft')  showSlide(current - 1);
        if (e.key === 'f' || e.key === 'F') {
            if (document.documentElement.requestFullscreen)
                document.documentElement.requestFullscreen();
        }
    });
    document.addEventListener('click', next);

    // ================================================================
    // RSS — shared fetch for both cards and ticker
    // ================================================================
    var tickerInner = document.getElementById('ticker-inner');
    var tickerScroll = document.getElementById('ticker-scroll');

    // Load news.json (generated by GitHub Actions, same-origin — no CORS)
    function rssFetchAll(callback) {
        var req = new XMLHttpRequest();
        req.open('GET', NEWS_JSON + '?v=' + Date.now());
        req.timeout = 8000;
        req.onload = function() {
            var allItems = [];
            try {
                var d = JSON.parse(req.responseText);
                (d.items || []).forEach(function(it) {
                    if (!it.title) return;
                    allItems.push({
                        type:     'rss_card',
                        duration: CONFIG.rssCardDuration,
                        _rssItem: { title: it.title, summary: it.summary || '',
                                authors: it.authors || '', published: it.published || '',
                                feedName: it.feedName, image: it.image || '' }
                    });
                });
            } catch(e) {}
            callback(allItems);
        };
        req.onerror = req.ontimeout = function() { callback([]); };
        req.send();
    }

    function tickerBuild(rssItems) {
        var FALLBACK = [
            'Nature Food: Advancing sustainable food systems through science',
            'Food Chemistry: Novel analytical methods for food quality assessment',
            'Trends in Food Science: Innovation in food processing and safety',
            'Food Quality & Preference: Consumer science and sensory evaluation',
            'Metabolomics and multi-omics approaches in food research',
        ];
        var titles = rssItems.length
            ? rssItems.map(function(it) { return it._rssItem.title; })
            : FALLBACK;
        var arr = shuffle(titles);
        var text = arr.join('   \u25C6   ');
        tickerInner.textContent = text;
        tickerInner.style.animation = 'none';
        tickerInner.getBoundingClientRect();
        var containerW = tickerScroll.offsetWidth || 800;
        var textW = text.length * 14; // ~14px per char at 1.5em
        var duration = Math.round((containerW + textW) / 80);
        tickerInner.style.animation = duration + 's ticker-move linear infinite';
    }

    // ================================================================
    // INIT — load slides.json, fetch RSS, then start
    // ================================================================
    var xhr = new XMLHttpRequest();
    xhr.open('GET', 'slides.json?v=' + Date.now());
    xhr.onload = function() {
        if (xhr.status === 200) {
            try {
                var data = JSON.parse(xhr.responseText);
                pool = data.pool || data;
            } catch(e) {}
        }
        rssFetchAll(function(rssItems) {
            rssItems.forEach(function(item) { pool.push(item); });
            buildPool();
            playlist = buildPlaylist();
            // Each screen starts at a random position → true independence
            showSlide(Math.floor(Math.random() * Math.max(1, playlist.length)));
            tickerBuild(rssItems);
        });
    };
    xhr.onerror = function() {
        buildPool();
        playlist = buildPlaylist();
        showSlide(0);
    };
    xhr.send();

    </script>
</body>
</html>
