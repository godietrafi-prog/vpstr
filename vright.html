<!DOCTYPE html>
<html lang="he">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="refresh" content="300">
    <title>View Right</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        html, body {
            width: 100%;
            height: 100%;
            background: #000;
            overflow: hidden;
        }

        #stage {
            position: fixed;
            top: 50%;
            left: 50%;
            width: 100vh;
            height: 100vw;
            transform: translate(-50%, -50%) rotate(90deg);
            display: flex;
            flex-direction: column;
        }

        /* ── Top accent bar ── */
        #top-bar {
            flex: 0 0 5%;
            background: linear-gradient(135deg, #4EC96A 0%, #3BB85A 100%);
            display: flex;
            align-items: center;
            padding: 0 2.5%;
            gap: 1.5%;
        }
        #top-bar .line {
            height: 3px;
            flex: 1;
            background: rgba(255,255,255,0.35);
            border-radius: 2px;
        }
        #top-bar .dot {
            width: 8px; height: 8px;
            border-radius: 50%;
            background: rgba(255,255,255,0.6);
            flex-shrink: 0;
        }

        /* ── Slides area ── */
        #slides-area {
            flex: 1;
            position: relative;
            background: #111;
        }

        .slide {
            position: absolute;
            top: 6px;
            left: 0;
            right: 0;
            bottom: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            opacity: 0;
            transition: opacity 1s ease-in-out;
        }
        .slide.active { opacity: 1; }

        .slide img, .slide video {
            width: 100%;
            height: 100%;
            object-fit: fill;
        }

        /* ── RSS card full-screen slides ── */
        .rss-card {
            background: linear-gradient(160deg, #0a1628 0%, #0d2a1a 100%);
            flex-direction: column;
            justify-content: center;
            align-items: flex-start;
            padding: 7% 9%;
            gap: 0;
            overflow: hidden;
        }
        .rss-card-journal {
            font-family: Arial, sans-serif;
            font-size: 1.4em;
            color: #4EC96A;
            font-weight: bold;
            letter-spacing: 0.15em;
            text-transform: uppercase;
            margin-bottom: 3%;
        }
        .rss-card-divider {
            width: 70px;
            height: 4px;
            background: #4EC96A;
            margin-bottom: 6%;
            border-radius: 2px;
            flex-shrink: 0;
        }
        .rss-card-title {
            font-family: Georgia, 'Times New Roman', serif;
            font-size: 2.8em;
            color: #ffffff;
            line-height: 1.25;
            font-weight: bold;
            margin-bottom: 5%;
        }
        .rss-card-summary {
            font-family: Arial, sans-serif;
            font-size: 1.35em;
            color: #9abfaa;
            line-height: 1.65;
        }

        /* ── News ticker ── */
        #news-ticker {
            flex: 0 0 6%;
            background: #0d1b2a;
            display: flex;
            align-items: center;
            overflow: hidden;
            border-top: 2px solid rgba(78,201,106,0.5);
        }
        #ticker-label {
            flex-shrink: 0;
            background: #4EC96A;
            color: #fff;
            font-family: Arial, sans-serif;
            font-size: 1.15em;
            font-weight: bold;
            padding: 0 1.5%;
            height: 100%;
            display: flex;
            align-items: center;
            white-space: nowrap;
            letter-spacing: 0.04em;
        }
        #ticker-scroll {
            flex: 1;
            overflow: hidden;
            height: 100%;
            position: relative;
        }
        #ticker-inner {
            position: absolute;
            top: 50%;
            left: 0;
            white-space: nowrap;
            font-family: Arial, sans-serif;
            font-size: 1.5em;
            color: #c8f5d6;
            padding-left: 100%;
            transform: translateY(-50%);
            will-change: transform;
        }
        @keyframes ticker-move {
            from { transform: translateY(-50%) translateX(0); }
            to   { transform: translateY(-50%) translateX(-100%); }
        }

        /* ── Bottom bar with logo ── */
        #bottom-bar {
            flex: 0 0 7%;
            background: #fff;
            display: flex;
            align-items: center;
            justify-content: flex-start;
            padding: 0 2%;
            border-top: 2px solid #4EC96A;
        }
        #bottom-bar img#logo {
            height: 50%;
            width: auto;
            object-fit: contain;
        }
    </style>
</head>
<body>
    <div id="stage">
        <div id="top-bar">
            <div class="dot"></div>
            <div class="line"></div>
            <div class="dot"></div>
            <div class="line"></div>
            <div class="dot"></div>
        </div>
        <div id="slides-area"></div>
        <div id="news-ticker">
            <div id="ticker-label">RESEARCH NEWS</div>
            <div id="ticker-scroll"><div id="ticker-inner">Loading headlines...</div></div>
        </div>
        <div id="bottom-bar">
            <img id="logo" src="Logo_official_eng.png" alt="Tel-Hai">
        </div>
    </div>

    <script>
    // ================================================================
    // CONFIGURATION
    // ================================================================
    var CONFIG = {
        posterDuration:  30,   // seconds for research posters
        imageDuration:    7,   // seconds for regular images
        rssCardDuration: 20,   // seconds for RSS full-screen cards
        rssMaxPerFeed:    3,   // how many articles to take from each feed
        loop: true
    };

    var RSS_FEEDS = [
        { url: 'https://www.nature.com/natfood.rss',                         name: 'Nature Food' },
        { url: 'https://rss.sciencedirect.com/publication/science/03088146', name: 'Food Chemistry' },
        { url: 'https://rss.sciencedirect.com/publication/science/09242244', name: 'Trends in Food Science' },
        { url: 'https://rss.sciencedirect.com/publication/science/09503293', name: 'Food Quality & Preference' },
    ];
    var RSS_PROXY = 'https://feed2json.org/convert?url=';

    // ================================================================
    // ENGINE
    // ================================================================
    var slidesArea = document.getElementById('slides-area');
    var pool     = [];
    var poolEls  = [];
    var playlist = [];
    var current  = 0;
    var timer    = null;

    function isVideo(src) { return /\.(mp4|webm|ogg|mov)$/i.test(src || ''); }

    function shuffle(arr) {
        var a = arr.slice();
        for (var i = a.length - 1; i > 0; i--) {
            var j = Math.floor(Math.random() * (i + 1));
            var t = a[i]; a[i] = a[j]; a[j] = t;
        }
        return a;
    }

    function stripHTML(html) {
        var d = document.createElement('div');
        d.innerHTML = html || '';
        return (d.textContent || d.innerText || '').replace(/\s+/g, ' ').trim();
    }

    // Every round: 3 posters → 1 rss_card, every 4 posters → 1 image
    function buildPlaylist() {
        var byType = {};
        for (var i = 0; i < pool.length; i++) {
            var t = pool[i].type || 'poster';
            if (!byType[t]) byType[t] = [];
            byType[t].push(i);
        }
        var posters  = shuffle(byType['poster']   || []);
        var images   = shuffle(byType['image']    || []);
        var rssCards = shuffle(byType['rss_card'] || []);
        var videos   = shuffle(byType['video']    || []);

        var pl = [];
        var ii = 0, ri = 0, vi = 0;
        for (var pi = 0; pi < posters.length; pi++) {
            pl.push(posters[pi]);
            if ((pi + 1) % 3 === 0 && ri < rssCards.length) pl.push(rssCards[ri++]);
            if ((pi + 1) % 4 === 0 && ii < images.length)   pl.push(images[ii++]);
            if ((pi + 1) % 3 === 0 && vi < videos.length)   pl.push(videos[vi++]);
        }
        while (ri < rssCards.length) pl.push(rssCards[ri++]);
        while (ii < images.length)   pl.push(images[ii++]);
        while (vi < videos.length)   pl.push(videos[vi++]);

        return pl.length > 0 ? pl : pool.map(function(_, i) { return i; });
    }

    function makeVideoSlide(div, src) {
        var vid = document.createElement('video');
        vid.src     = src;
        vid.muted   = true;
        vid.setAttribute('playsinline', '');
        vid.preload = 'auto';
        vid.style.width     = '100%';
        vid.style.height    = '100%';
        vid.style.objectFit = 'fill';
        div._vidEl = vid;
        div._start = function() {};
        div._stop  = function() {};
        div.appendChild(vid);
    }

    function makeRSSCardSlide(div, rssItem) {
        div.classList.add('rss-card');

        var journalEl = document.createElement('div');
        journalEl.className   = 'rss-card-journal';
        journalEl.textContent = rssItem.feedName;

        var dividerEl = document.createElement('div');
        dividerEl.className = 'rss-card-divider';

        var titleEl = document.createElement('div');
        titleEl.className   = 'rss-card-title';
        titleEl.textContent = rssItem.title;

        div.appendChild(journalEl);
        div.appendChild(dividerEl);
        div.appendChild(titleEl);

        if (rssItem.summary) {
            var summaryEl = document.createElement('div');
            summaryEl.className   = 'rss-card-summary';
            summaryEl.textContent = rssItem.summary;
            div.appendChild(summaryEl);
        }
    }

    function buildPool() {
        for (var i = 0; i < pool.length; i++) {
            var item = pool[i];
            var div  = document.createElement('div');
            div.className = 'slide';

            if (item.type === 'rss_card') {
                div.setAttribute('data-type', 'image');
                div.setAttribute('data-duration', String(item.duration || CONFIG.rssCardDuration));
                makeRSSCardSlide(div, item._rssItem);
            } else if (isVideo(item.src)) {
                div.setAttribute('data-type', 'video');
                makeVideoSlide(div, item.src_right || item.src);
            } else {
                var img = document.createElement('img');
                img.src     = item.src;
                img.alt     = '';
                img.loading = 'eager';
                div.setAttribute('data-type', 'image');
                var dur = (item.duration != null) ? item.duration :
                          (item.type === 'poster' ? CONFIG.posterDuration : CONFIG.imageDuration);
                div.setAttribute('data-duration', String(dur));
                div.appendChild(img);
            }

            slidesArea.appendChild(div);
            poolEls.push(div);
        }
    }

    function showSlide(pos) {
        if (!pool.length) return;
        if (pos >= playlist.length) {
            if (!CONFIG.loop) return;
            playlist = buildPlaylist();
            pos = 0;
        }
        for (var j = 0; j < poolEls.length; j++) {
            poolEls[j].classList.remove('active');
            if (poolEls[j]._stop)   poolEls[j]._stop();
            if (poolEls[j]._vidEl) {
                poolEls[j]._vidEl.pause();
                poolEls[j]._vidEl.onended = null;
            }
        }
        clearTimeout(timer);

        current = pos;
        var el = poolEls[playlist[current]];
        el.classList.add('active');

        if (el.getAttribute('data-type') === 'video') {
            var vid = el._vidEl;
            vid.currentTime = 0;
            el._start();
            vid.play()['catch'](function() { next(); });
            vid.onended = function() { el._stop(); next(); };
            timer = setTimeout(function() { el._stop(); next(); }, 60000);
        } else {
            var dur = parseFloat(el.getAttribute('data-duration'));
            var img = el.querySelector('img');
            function startTimer() { timer = setTimeout(next, dur * 1000); }
            if (img && !img.complete) {
                img.onload  = startTimer;
                img.onerror = function() { next(); };
            } else {
                startTimer();
            }
        }
    }

    function next() { showSlide(current + 1); }

    document.addEventListener('keydown', function(e) {
        if (e.key === 'ArrowRight' || e.key === ' ')  next();
        if (e.key === 'ArrowLeft')  showSlide(current - 1);
        if (e.key === 'f' || e.key === 'F') {
            if (document.documentElement.requestFullscreen)
                document.documentElement.requestFullscreen();
        }
    });
    document.addEventListener('click', next);

    // ================================================================
    // RSS — shared fetch for both cards and ticker
    // ================================================================
    var tickerInner = document.getElementById('ticker-inner');
    var tickerScroll = document.getElementById('ticker-scroll');

    function rssFetchAll(callback) {
        var allItems = [];
        var remaining = RSS_FEEDS.length;
        var done = false;

        var timeout = setTimeout(function() {
            if (!done) { done = true; callback(allItems); }
        }, 10000);

        RSS_FEEDS.forEach(function(feed) {
            var url = RSS_PROXY + encodeURIComponent(feed.url);
            var req = new XMLHttpRequest();
            req.open('GET', url);
            req.timeout = 7000;
            req.onload = function() {
                try {
                    var d = JSON.parse(req.responseText);
                    if (d.items && d.items.length) {
                        d.items.slice(0, CONFIG.rssMaxPerFeed).forEach(function(it) {
                            if (!it.title) return;
                            var raw = it.summary || stripHTML(it.content_html || '');
                            if (raw.length > 280) raw = raw.substring(0, 277) + '...';
                            allItems.push({
                                type:     'rss_card',
                                duration: CONFIG.rssCardDuration,
                                _rssItem: { title: it.title, summary: raw, feedName: feed.name }
                            });
                        });
                    }
                } catch(e) {}
                if (--remaining === 0 && !done) { done = true; clearTimeout(timeout); callback(allItems); }
            };
            req.onerror = req.ontimeout = function() {
                if (--remaining === 0 && !done) { done = true; clearTimeout(timeout); callback(allItems); }
            };
            req.send();
        });
    }

    function tickerBuild(rssItems) {
        var FALLBACK = [
            'Nature Food: Advancing sustainable food systems through science',
            'Food Chemistry: Novel analytical methods for food quality assessment',
            'Trends in Food Science: Innovation in food processing and safety',
            'Food Quality & Preference: Consumer science and sensory evaluation',
            'Metabolomics and multi-omics approaches in food research',
        ];
        var titles = rssItems.length
            ? rssItems.map(function(it) { return it._rssItem.title; })
            : FALLBACK;
        var arr = shuffle(titles);
        var text = arr.join('   \u25C6   ');
        tickerInner.textContent = text;
        tickerInner.style.animation = 'none';
        tickerInner.getBoundingClientRect();
        var containerW = tickerScroll.offsetWidth || 800;
        var textW = text.length * 14; // ~14px per char at 1.5em
        var duration = Math.round((containerW + textW) / 80);
        tickerInner.style.animation = duration + 's ticker-move linear infinite';
    }

    // ================================================================
    // INIT — load slides.json, fetch RSS, then start
    // ================================================================
    var xhr = new XMLHttpRequest();
    xhr.open('GET', 'slides.json?v=' + Date.now());
    xhr.onload = function() {
        if (xhr.status === 200) {
            try {
                var data = JSON.parse(xhr.responseText);
                pool = data.pool || data;
            } catch(e) {}
        }
        rssFetchAll(function(rssItems) {
            rssItems.forEach(function(item) { pool.push(item); });
            buildPool();
            playlist = buildPlaylist();
            // Each screen starts at a random position → true independence
            showSlide(Math.floor(Math.random() * Math.max(1, playlist.length)));
            tickerBuild(rssItems);
        });
    };
    xhr.onerror = function() {
        buildPool();
        playlist = buildPlaylist();
        showSlide(0);
    };
    xhr.send();

    </script>
</body>
</html>
