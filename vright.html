<!DOCTYPE html>
<html lang="he">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="refresh" content="300">
    <title>View Right</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@300;400&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        html, body {
            width: 100%;
            height: 100%;
            background: #000;
            overflow: hidden;
        }

        #stage {
            position: fixed;
            top: 50%;
            left: 50%;
            width: 100vh;
            height: 100vw;
            transform: translate(-50%, -50%) rotate(90deg);
            display: flex;
            flex-direction: column;
        }

        /* ── Top accent bar ── */
        #top-bar {
            flex: 0 0 5%;
            background: linear-gradient(135deg, #4EC96A 0%, #3BB85A 100%);
            display: flex;
            align-items: center;
            padding: 0 2.5%;
            gap: 1.5%;
        }
        #top-bar .line {
            height: 3px;
            flex: 1;
            background: rgba(255,255,255,0.35);
            border-radius: 2px;
        }
        #top-bar .dot {
            width: 8px; height: 8px;
            border-radius: 50%;
            background: rgba(255,255,255,0.6);
            flex-shrink: 0;
        }

        /* ── Slides area ── */
        #slides-area {
            flex: 1;
            position: relative;
            background: #111;
        }

        .slide {
            position: absolute;
            top: 6px;
            left: 0;
            right: 0;
            bottom: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            opacity: 0;
            transform: scale(1.012);
            transition: opacity 2s cubic-bezier(0.4,0,0.2,1),
                        transform 2s cubic-bezier(0.4,0,0.2,1);
        }
        .slide.active { opacity: 1; transform: scale(1.0); }

        .slide video {
            width: 100%;
            height: 100%;
            object-fit: fill;
        }

        /* ── Poster / standalone-image wrapper ── */
        .poster-wrap {
            position: relative;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
        }
        .poster-wrap::before {
            content: '';
            position: absolute;
            inset: -10%;
            width: 120%; height: 120%;
            background: inherit;
            background-size: cover;
            filter: blur(30px) brightness(0.26) saturate(1.7);
            z-index: 0;
        }
        .poster-wrap::after {
            content: '';
            position: absolute;
            inset: 0;
            background: radial-gradient(ellipse at center, transparent 52%, rgba(0,0,0,0.5) 100%);
            z-index: 2;
            pointer-events: none;
        }
        .poster-wrap img {
            position: relative;
            z-index: 1;
            width: 100%; height: 100%;
            object-fit: contain;
        }

        /* ── RSS card full-screen slides ── */
        @keyframes bg-breathe {
            0%   { background-position: 0%   0%; }
            50%  { background-position: 100% 100%; }
            100% { background-position: 0%   0%; }
        }
        .rss-card {
            background: linear-gradient(155deg, #071422 0%, #0b2618 40%, #0e2d1c 55%, #071422 100%);
            background-size: 220% 220%;
            animation: bg-breathe 22s ease-in-out infinite;
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            justify-content: flex-start;
            align-items: flex-start;
            padding: 6% 9% 0 9%;
            gap: 0;
            overflow: hidden;
        }
        .rss-card-quote {
            font-family: Georgia, serif;
            font-size: 7em;
            color: rgba(78, 201, 106, 0.13);
            line-height: 0.75;
            margin-bottom: -0.1em;
            margin-left: -0.05em;
            flex-shrink: 0;
            user-select: none;
        }
        .rss-card-badge {
            display: inline-flex;
            align-items: center;
            background: rgba(78, 201, 106, 0.12);
            border: 1.5px solid #4EC96A;
            color: #4EC96A;
            font-family: Arial, sans-serif;
            font-size: 1em;
            font-weight: bold;
            padding: 0.3em 1.1em;
            border-radius: 2em;
            letter-spacing: 0.07em;
            text-transform: uppercase;
            margin-bottom: 3.5%;
            flex-shrink: 0;
        }
        .rss-card-title {
            font-family: Georgia, 'Times New Roman', serif;
            font-size: 2.5em;
            color: #ffffff;
            line-height: 1.2;
            font-weight: bold;
            margin-bottom: 3%;
            flex-shrink: 0;
        }
        /* Authors + date on one line, below title */
        .rss-card-meta {
            width: 100%;
            display: flex;
            align-items: center;
            gap: 2.5%;
            border-top: 1px solid rgba(78, 201, 106, 0.25);
            padding-top: 2.5%;
            margin-bottom: 3%;
            flex-shrink: 0;
        }
        .rss-card-authors {
            font-family: Arial, sans-serif;
            font-size: 1.05em;
            color: #5a9a6a;
            font-style: italic;
            flex: 1;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }
        .rss-card-date {
            font-family: Arial, sans-serif;
            font-size: 1em;
            color: #4EC96A;
            font-weight: bold;
            flex-shrink: 0;
            white-space: nowrap;
        }
        /* Abstract below meta */
        .rss-card-abstract {
            font-family: Arial, sans-serif;
            font-size: 1.15em;
            color: #a0c8b0;
            line-height: 1.6;
            margin-bottom: 3%;
            flex-shrink: 1;
            overflow: hidden;
            display: -webkit-box;
            -webkit-line-clamp: 15;
            -webkit-box-orient: vertical;
        }
        /* Figure fills remaining vertical space at the bottom */
        .rss-card-figure {
            flex: 1;
            min-height: 0;
            width: calc(100% + 18%);
            margin-left: -9%;
            position: relative;
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #020c14;
        }
        .rss-card-figure::before {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0;
            height: 45%;
            background: linear-gradient(to bottom, #071422 0%, rgba(7,20,34,0) 100%);
            z-index: 1;
            pointer-events: none;
        }
        .rss-card-figure::after {
            content: '';
            position: absolute;
            bottom: 0; left: 0; right: 0;
            height: 35%;
            background: linear-gradient(to top, rgba(7,20,34,0.65) 0%, rgba(7,20,34,0) 100%);
            z-index: 1;
            pointer-events: none;
        }
        .rss-card-figure img {
            max-width: 100%;
            max-height: 100%;
            object-fit: contain;
            object-position: center;
            opacity: 1;
            animation: ken-burns 45s ease-in-out both;
        }

        /* ── Dual compact card slide (two articles, no abstract/image) ── */
        .rss-dual {
            background: linear-gradient(155deg, #071422 0%, #0b2618 40%, #0e2d1c 55%, #071422 100%);
            background-size: 220% 220%;
            animation: bg-breathe 22s ease-in-out infinite;
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            padding: 5% 9% 4% 9%;
            overflow: hidden;
        }
        .rss-compact {
            flex: 1;
            min-height: 0;
            display: flex;
            flex-direction: column;
            justify-content: flex-start;
            padding-top: 5%;
            padding-left: 5%;
            border-left: 3px solid rgba(78, 201, 106, 0.4);
        }
        .rss-compact--second {
            border-top: 1px solid rgba(78, 201, 106, 0.18);
            margin-top: 4%;
            padding-top: 4%;
        }
        .rss-compact-badge {
            display: inline-flex;
            align-items: center;
            background: rgba(78, 201, 106, 0.10);
            border: 1px solid rgba(78, 201, 106, 0.6);
            color: #4EC96A;
            font-family: Arial, sans-serif;
            font-size: 0.82em;
            font-weight: bold;
            padding: 0.2em 0.9em;
            border-radius: 2em;
            letter-spacing: 0.06em;
            text-transform: uppercase;
            margin-bottom: 2%;
            flex-shrink: 0;
        }
        .rss-compact-title {
            font-family: Georgia, 'Times New Roman', serif;
            font-size: 1.85em;
            color: #ffffff;
            line-height: 1.2;
            font-weight: bold;
            margin-bottom: 2%;
            flex-shrink: 0;
            overflow: hidden;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
        }
        .rss-compact-meta {
            display: flex;
            align-items: center;
            gap: 2.5%;
            flex-shrink: 0;
        }
        .rss-compact-authors {
            font-family: Arial, sans-serif;
            font-size: 0.9em;
            color: #5a9a6a;
            font-style: italic;
            flex: 1;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }
        .rss-compact-date {
            font-family: Arial, sans-serif;
            font-size: 0.85em;
            color: #4EC96A;
            font-weight: bold;
            flex-shrink: 0;
            white-space: nowrap;
        }

        /* ── Lab paper card ── */
        /* ── Lab paper card (same structure as rss-card) ── */
        .lab-card {
            background: linear-gradient(155deg, #071422 0%, #0b2618 40%, #0e2d1c 55%, #071422 100%);
            background-size: 220% 220%;
            animation: bg-breathe 22s ease-in-out infinite;
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            justify-content: flex-start;
            align-items: flex-start;
            padding: 6% 9% 0 9%;
            overflow: hidden;
        }
        /* citation badge — right side of top row (flex, no absolute) */
        .lab-card-top-row {
            width: 100%;
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 2%;
            flex-shrink: 0;
            gap: 3%;
        }
        .lab-citation-badge {
            display: flex;
            flex-direction: column;
            align-items: flex-end;
            gap: 0.25em;
            flex-shrink: 0;
        }
        .lab-citation-total {
            display: flex;
            align-items: baseline;
            gap: 0.35em;
            padding: 0.25em 0.7em;
            border-radius: 0.55em;
            background: rgba(245,181,0,0.08);
            border: 1.5px solid rgba(245,181,0,0.35);
        }
        .lab-citation-badge.high-impact .lab-citation-total {
            border-color: rgba(245,181,0,0.70);
            box-shadow: 0 0 10px rgba(245,181,0,0.20);
            animation: cite-glow 3s ease-in-out infinite;
        }
        @keyframes cite-glow {
            0%, 100% { box-shadow: 0 0 10px rgba(245,181,0,0.20); }
            50%       { box-shadow: 0 0 20px rgba(245,181,0,0.40); }
        }
        .lab-citation-count {
            font-family: 'Orbitron', 'Courier New', monospace;
            font-size: 1.5em;
            font-weight: 700;
            color: #F5B500;
            line-height: 1;
        }
        .lab-citation-label {
            font-family: Arial, sans-serif;
            font-size: 0.62em;
            color: rgba(245,181,0,0.55);
            letter-spacing: 0.1em;
            text-transform: uppercase;
            font-weight: 600;
        }
        .lab-citation-recent {
            font-family: Arial, sans-serif;
            font-size: 0.78em;
            color: rgba(245,181,0,0.80);
            letter-spacing: 0.04em;
        }
        /* circular photo — wrapper enforces size, img fills it */
        .lab-card-photo-wrap {
            width: 18%;
            aspect-ratio: 1;
            border-radius: 50%;
            overflow: hidden;
            flex-shrink: 0;
            margin-bottom: 3%;
            border: 3px solid #4EC96A;
            box-shadow: 0 0 22px rgba(78,201,106,0.45), 0 0 50px rgba(78,201,106,0.15);
            position: relative;
        }
        .lab-card-photo-wrap img {
            position: absolute;
            top: 0; left: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        .lab-card-photo-placeholder {
            width: 18%;
            aspect-ratio: 1;
            border-radius: 50%;
            background: rgba(78,201,106,0.1);
            border: 3px solid rgba(78,201,106,0.4);
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: Georgia, serif;
            font-size: 2.8em;
            color: rgba(78,201,106,0.55);
            flex-shrink: 0;
            margin-bottom: 3%;
        }
        .lab-card-badge {
            display: inline-flex;
            align-items: center;
            background: rgba(78,201,106,0.12);
            border: 1.5px solid #4EC96A;
            color: #4EC96A;
            font-family: Arial, sans-serif;
            font-size: 1em;
            font-weight: bold;
            padding: 0.3em 1.1em;
            border-radius: 2em;
            letter-spacing: 0.07em;
            text-transform: uppercase;
            margin-bottom: 2%;
            flex-shrink: 0;
        }
        .lab-card-researcher-name {
            font-family: Georgia, 'Times New Roman', serif;
            font-size: 1.3em;
            color: rgba(78,201,106,0.75);
            font-style: italic;
            flex-shrink: 0;
            margin-bottom: 3.5%;
        }
        .lab-card-title {
            font-family: Georgia, 'Times New Roman', serif;
            font-size: 2.5em;
            color: #ffffff;
            line-height: 1.2;
            font-weight: bold;
            margin-bottom: 3%;
            flex-shrink: 0;
        }
        .lab-card-meta {
            width: 100%;
            display: flex;
            align-items: center;
            gap: 2.5%;
            border-top: 1px solid rgba(78,201,106,0.25);
            padding-top: 2.5%;
            margin-bottom: 3%;
            flex-shrink: 0;
        }
        .lab-card-authors {
            font-family: Arial, sans-serif;
            font-size: 1.05em;
            color: #5a9a6a;
            font-style: italic;
            flex: 1;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }
        .lab-card-date {
            font-family: Arial, sans-serif;
            font-size: 1em;
            color: #4EC96A;
            font-weight: bold;
            flex-shrink: 0;
            white-space: nowrap;
        }
        .lab-card-abstract {
            font-family: Arial, sans-serif;
            font-size: 1.15em;
            color: #a0c8b0;
            line-height: 1.6;
            flex-shrink: 1;
            overflow: hidden;
            display: -webkit-box;
            -webkit-line-clamp: 15;
            -webkit-box-orient: vertical;
        }

        /* ── Clock in bottom bar ── */
        #clock-digits {
            font-family: 'Orbitron', 'Courier New', monospace;
            font-size: 1.5em;
            font-weight: 400;
            letter-spacing: 0.1em;
            color: #2e8b47;
            white-space: nowrap;
        }
        #clock-sep {
            display: inline-block;
            animation: sep-pulse 2s ease-in-out infinite;
        }
        @keyframes sep-pulse {
            0%, 100% { opacity: 1; }
            50%       { opacity: 0.2; }
        }

        /* ── News ticker ── */
        #news-ticker {
            flex: 0 0 6%;
            background: #0d1b2a;
            display: flex;
            align-items: center;
            overflow: hidden;
            border-top: 2px solid rgba(78,201,106,0.5);
        }
        #ticker-label {
            flex-shrink: 0;
            background: #4EC96A;
            color: #fff;
            font-family: Arial, sans-serif;
            font-size: 1.15em;
            font-weight: bold;
            padding: 0 1.5%;
            height: 100%;
            display: flex;
            align-items: center;
            white-space: nowrap;
            letter-spacing: 0.04em;
        }
        #ticker-scroll {
            flex: 1;
            overflow: hidden;
            height: 100%;
            position: relative;
        }
        #ticker-scroll::before,
        #ticker-scroll::after {
            content: '';
            position: absolute;
            top: 0; bottom: 0;
            width: 70px;
            z-index: 2;
            pointer-events: none;
        }
        #ticker-scroll::before {
            left: 0;
            background: linear-gradient(to right, #0d1b2a 20%, transparent 100%);
        }
        #ticker-scroll::after {
            right: 0;
            background: linear-gradient(to left, #0d1b2a 20%, transparent 100%);
        }
        #ticker-inner {
            position: absolute;
            top: 50%;
            left: 0;
            white-space: nowrap;
            font-family: Arial, sans-serif;
            font-size: 1.5em;
            color: #c8f5d6;
            padding-left: 100%;
            transform: translateY(-50%);
            will-change: transform;
        }
        @keyframes ticker-move {
            from { transform: translateY(-50%) translateX(0); }
            to   { transform: translateY(-50%) translateX(-100%); }
        }

        /* ── Bottom bar with logo ── */
        #bottom-bar {
            flex: 0 0 7%;
            background: #fff;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 2%;
            border-top: 2px solid #4EC96A;
        }
        #bottom-bar img#logo {
            height: 50%;
            width: auto;
            object-fit: contain;
        }
    </style>
</head>
<body>
    <div id="stage">
        <div id="top-bar">
            <div class="dot"></div>
            <div class="line"></div>
            <div class="dot"></div>
            <div class="line"></div>
            <div class="dot"></div>
        </div>
        <div id="slides-area"></div>
        <div id="news-ticker">
            <div id="ticker-label">RESEARCH NEWS</div>
            <div id="ticker-scroll"><div id="ticker-inner">Loading headlines...</div></div>
        </div>
        <div id="bottom-bar">
            <img id="logo" src="Logo_official_eng.png" alt="Tel-Hai">
            <div id="clock-digits">
                <span id="clock-hh">00</span><span id="clock-sep">:</span><span id="clock-mm">00</span>
            </div>
        </div>
    </div>

    <script>
    // ================================================================
    // CONFIGURATION
    // ================================================================
    var CONFIG = {
        posterDuration:  45,   // seconds for research posters
        imageDuration:    7,   // seconds for regular images
        rssCardDuration: 45,   // seconds for RSS full-screen cards
        rssMaxPerFeed:    3,   // how many articles to take from each feed
        loop: true
    };

    // news.json is generated every 2h by GitHub Actions (scripts/fetch_news.py)
    // — no CORS issues, same-origin fetch
    var NEWS_JSON = 'news.json';

    // ================================================================
    // ENGINE
    // ================================================================
    var slidesArea = document.getElementById('slides-area');
    var pool     = [];
    var poolEls  = [];
    var playlist = [];
    var current  = 0;
    var timer    = null;

    function isVideo(src) { return /\.(mp4|webm|ogg|mov)$/i.test(src || ''); }

    function shuffle(arr) {
        var a = arr.slice();
        for (var i = a.length - 1; i > 0; i--) {
            var j = Math.floor(Math.random() * (i + 1));
            var t = a[i]; a[i] = a[j]; a[j] = t;
        }
        return a;
    }

    function stripHTML(html) {
        var d = document.createElement('div');
        d.innerHTML = html || '';
        return (d.textContent || d.innerText || '').replace(/\s+/g, ' ').trim();
    }

    function makeRSSDualSlide(div, card1, card2) {
        var wrap = document.createElement('div');
        wrap.className = 'rss-dual';
        [card1, card2].forEach(function(rssItem, idx) {
            if (!rssItem) return;
            var cardEl = document.createElement('div');
            cardEl.className = 'rss-compact' + (idx === 1 ? ' rss-compact--second' : '');
            var badgeEl = document.createElement('div');
            badgeEl.className   = 'rss-compact-badge';
            badgeEl.textContent = rssItem.feedName;
            cardEl.appendChild(badgeEl);
            var titleEl = document.createElement('div');
            titleEl.className   = 'rss-compact-title';
            titleEl.textContent = rssItem.title;
            cardEl.appendChild(titleEl);
            if (rssItem.authors || rssItem.published) {
                var metaEl = document.createElement('div');
                metaEl.className = 'rss-compact-meta';
                if (rssItem.authors) {
                    var authEl = document.createElement('span');
                    authEl.className   = 'rss-compact-authors';
                    authEl.textContent = rssItem.authors;
                    metaEl.appendChild(authEl);
                }
                if (rssItem.published) {
                    var dateEl = document.createElement('span');
                    dateEl.className   = 'rss-compact-date';
                    dateEl.textContent = rssItem.published;
                    metaEl.appendChild(dateEl);
                }
                cardEl.appendChild(metaEl);
            }
            wrap.appendChild(cardEl);
        });
        div.appendChild(wrap);
    }

    // Every round: 2 posters → 1 rss slide (rich or dual), every 3 → 1 image
    function buildPlaylist() {
        var byType = {};
        for (var i = 0; i < pool.length; i++) {
            var t = pool[i].type || 'poster';
            if (!byType[t]) byType[t] = [];
            byType[t].push(i);
        }
        var posters   = shuffle(byType['poster']    || []);
        var images    = shuffle(byType['image']     || []);
        var videos    = shuffle(byType['video']     || []);
        var rssCards  = shuffle((byType['rss_card'] || []).concat(byType['rss_dual'] || []));
        var labPapers = shuffle(byType['lab_paper'] || []);

        var pl = [];
        var ii = 0, ri = 0, vi = 0, li = 0;
        for (var pi = 0; pi < posters.length; pi++) {
            pl.push(posters[pi]);
            if ((pi + 1) % 2 === 0 && ri < rssCards.length)  pl.push(rssCards[ri++]);
            if ((pi + 1) % 3 === 0 && li < labPapers.length) pl.push(labPapers[li++]);
            if ((pi + 1) % 3 === 0 && ii < images.length)    pl.push(images[ii++]);
            if ((pi + 1) % 3 === 0 && vi < videos.length)    pl.push(videos[vi++]);
        }
        while (ii < images.length) pl.push(images[ii++]);
        while (vi < videos.length) pl.push(videos[vi++]);

        return pl.length > 0 ? pl : pool.map(function(_, i) { return i; });
    }

    function makeVideoSlide(div, src) {
        var vid = document.createElement('video');
        vid.src     = src;
        vid.muted   = true;
        vid.setAttribute('playsinline', '');
        vid.preload = 'auto';
        vid.style.width     = '100%';
        vid.style.height    = '100%';
        vid.style.objectFit = 'fill';
        div._vidEl = vid;
        div._start = function() {};
        div._stop  = function() {};
        div.appendChild(vid);
    }

    function makeLabPaperSlide(div, item) {
        div.classList.add('lab-card');
        var res = item.researcher || {};

        // Circular photo — wrapper div enforces size, img fills it
        if (res.photo) {
            var wrap = document.createElement('div');
            wrap.className = 'lab-card-photo-wrap';
            var photoEl = document.createElement('img');
            photoEl.src = res.photo;
            photoEl.alt = res.name || '';
            photoEl.onerror = function() {
                wrap.parentNode.replaceChild(makePlaceholder(res.name), wrap);
            };
            wrap.appendChild(photoEl);
            div.appendChild(wrap);
        } else {
            div.appendChild(makePlaceholder(res.name));
        }
        function makePlaceholder(name) {
            var ph = document.createElement('div');
            ph.className = 'lab-card-photo-placeholder';
            ph.textContent = (name || '?')[0];
            return ph;
        }

        // Badge
        var badge = document.createElement('div');
        badge.className = 'lab-card-badge';
        badge.textContent = 'LAB RESEARCH · TEL-HAI';
        div.appendChild(badge);

        // Researcher name (byline)
        if (res.name) {
            var nameEl = document.createElement('div');
            nameEl.className = 'lab-card-researcher-name';
            nameEl.textContent = res.name;
            div.appendChild(nameEl);
        }

        // Top row: [LAB RESEARCH badge] [citation badge — right]
        var topRow = document.createElement('div');
        topRow.className = 'lab-card-top-row';
        var labBadge = document.createElement('div');
        labBadge.className = 'lab-card-badge';
        labBadge.textContent = 'LAB RESEARCH · TEL-HAI';
        topRow.appendChild(labBadge);
        var cites = item.citationCount || 0;
        if (cites > 0) {
            var citeBadge = document.createElement('div');
            citeBadge.className = 'lab-citation-badge' + (cites >= 50 ? ' high-impact' : '');
            var totalEl = document.createElement('div');
            totalEl.className = 'lab-citation-total';
            var cCount = document.createElement('span');
            cCount.className = 'lab-citation-count';
            cCount.textContent = cites >= 1000 ? (cites/1000).toFixed(1)+'k' : cites;
            var cLabel = document.createElement('span');
            cLabel.className = 'lab-citation-label';
            cLabel.textContent = 'cited';
            totalEl.appendChild(cCount);
            totalEl.appendChild(cLabel);
            citeBadge.appendChild(totalEl);
            var recent = item.recentCitations || 0;
            if (recent > 0) {
                var recentEl = document.createElement('div');
                recentEl.className = 'lab-citation-recent';
                recentEl.textContent = '▲ ' + recent + ' this month';
                citeBadge.appendChild(recentEl);
            }
            topRow.appendChild(citeBadge);
        }
        div.appendChild(topRow);

        // Researcher name (byline)
        if (res.name) {
            var nameEl = document.createElement('div');
            nameEl.className = 'lab-card-researcher-name';
            nameEl.textContent = res.name;
            div.appendChild(nameEl);
        }

        // Title
        var titleEl = document.createElement('div');
        titleEl.className = 'lab-card-title';
        titleEl.textContent = item.title;
        div.appendChild(titleEl);

        // Meta row: authors | venue·year
        var meta = document.createElement('div');
        meta.className = 'lab-card-meta';
        if (item.authors) {
            var authEl = document.createElement('div');
            authEl.className = 'lab-card-authors';
            authEl.textContent = item.authors;
            meta.appendChild(authEl);
        }
        if (item.published || item.venue) {
            var dateEl = document.createElement('div');
            dateEl.className = 'lab-card-date';
            dateEl.textContent = [item.venue, item.published].filter(Boolean).join(' · ');
            meta.appendChild(dateEl);
        }
        div.appendChild(meta);

        // Abstract
        if (item.abstract) {
            var absEl = document.createElement('div');
            absEl.className = 'lab-card-abstract';
            absEl.textContent = item.abstract;
            div.appendChild(absEl);
        }
    }

    function makeRSSCardSlide(div, rssItem) {
        div.classList.add('rss-card');

        // Decorative quote mark
        var quoteEl = document.createElement('div');
        quoteEl.className   = 'rss-card-quote';
        quoteEl.textContent = '\u201C';
        div.appendChild(quoteEl);

        // Journal badge
        var badgeEl = document.createElement('div');
        badgeEl.className   = 'rss-card-badge';
        badgeEl.textContent = rssItem.feedName;
        div.appendChild(badgeEl);

        // Article title
        var titleEl = document.createElement('div');
        titleEl.className   = 'rss-card-title';
        titleEl.textContent = rssItem.title;
        div.appendChild(titleEl);

        // Meta line: authors + date
        if (rssItem.authors || rssItem.published) {
            var metaEl = document.createElement('div');
            metaEl.className = 'rss-card-meta';
            if (rssItem.authors) {
                var authEl = document.createElement('span');
                authEl.className   = 'rss-card-authors';
                authEl.textContent = rssItem.authors;
                metaEl.appendChild(authEl);
            }
            if (rssItem.published) {
                var dateEl = document.createElement('span');
                dateEl.className   = 'rss-card-date';
                dateEl.textContent = rssItem.published;
                metaEl.appendChild(dateEl);
            }
            div.appendChild(metaEl);
        }

        // Abstract (below meta)
        if (rssItem.abstract) {
            var absEl = document.createElement('div');
            absEl.className   = 'rss-card-abstract';
            absEl.textContent = rssItem.abstract;
            div.appendChild(absEl);
        }

        // Figure fills remaining vertical space at bottom
        if (rssItem.image) {
            var figDiv = document.createElement('div');
            figDiv.className = 'rss-card-figure';
            var imgEl = document.createElement('img');
            imgEl.src     = rssItem.image;
            imgEl.alt     = '';
            imgEl.loading = 'eager';
            imgEl.onerror = function() {
                this.parentElement.remove();  // 404 = no figure for this article
            };
            figDiv.appendChild(imgEl);
            div.appendChild(figDiv);
        }
    }

    function buildPool() {
        for (var i = 0; i < pool.length; i++) {
            var item = pool[i];
            var div  = document.createElement('div');
            div.className = 'slide';

            if (item.type === 'lab_paper') {
                div.setAttribute('data-type', 'image');
                div.setAttribute('data-duration', String(item.duration || CONFIG.rssCardDuration));
                makeLabPaperSlide(div, item);
            } else if (item.type === 'rss_card') {
                div.setAttribute('data-type', 'image');
                div.setAttribute('data-duration', String(item.duration || CONFIG.rssCardDuration));
                makeRSSCardSlide(div, item._rssItem);
            } else if (item.type === 'rss_dual') {
                div.setAttribute('data-type', 'image');
                div.setAttribute('data-duration', String(item.duration || CONFIG.rssCardDuration));
                makeRSSDualSlide(div, item._cards[0], item._cards[1]);
            } else if (isVideo(item.src)) {
                div.setAttribute('data-type', 'video');
                makeVideoSlide(div, item.src_right || item.src);
            } else {
                var src = item.src_right || item.src;
                var wrap = document.createElement('div');
                wrap.className = 'poster-wrap';
                wrap.style.backgroundImage = 'url("' + src.replace(/"/g, '\\"') + '")';
                var fgImg = document.createElement('img');
                fgImg.src = src; fgImg.alt = ''; fgImg.loading = 'eager';
                wrap.appendChild(fgImg);
                div.appendChild(wrap);
                div.setAttribute('data-type', 'image');
                var dur = (item.duration != null) ? item.duration :
                          (item.type === 'poster' ? CONFIG.posterDuration : CONFIG.imageDuration);
                div.setAttribute('data-duration', String(dur));
            }

            slidesArea.appendChild(div);
            poolEls.push(div);
        }
    }

    function showSlide(pos) {
        if (!pool.length) return;
        if (pos >= playlist.length) {
            if (!CONFIG.loop) return;
            playlist = buildPlaylist();
            pos = 0;
        }
        for (var j = 0; j < poolEls.length; j++) {
            poolEls[j].classList.remove('active');
            if (poolEls[j]._stop)   poolEls[j]._stop();
            if (poolEls[j]._vidEl) {
                poolEls[j]._vidEl.pause();
                poolEls[j]._vidEl.onended = null;
            }
        }
        clearTimeout(timer);

        current = pos;
        var el = poolEls[playlist[current]];
        el.classList.add('active');

        if (el.getAttribute('data-type') === 'video') {
            var vid = el._vidEl;
            vid.currentTime = 0;
            el._start();
            vid.play()['catch'](function() { next(); });
            vid.onended = function() { el._stop(); next(); };
            timer = setTimeout(function() { el._stop(); next(); }, 60000);
        } else {
            var dur = parseFloat(el.getAttribute('data-duration'));
            var img = el.querySelector('img');
            function startTimer() { timer = setTimeout(next, dur * 1000); }
            if (img && !img.complete) {
                img.onload  = startTimer;
                img.onerror = function() { next(); };
            } else {
                startTimer();
            }
        }
    }

    function next() { showSlide(current + 1); }

    document.addEventListener('keydown', function(e) {
        if (e.key === 'ArrowRight' || e.key === ' ')  next();
        if (e.key === 'ArrowLeft')  showSlide(current - 1);
        if (e.key === 'f' || e.key === 'F') {
            if (document.documentElement.requestFullscreen)
                document.documentElement.requestFullscreen();
        }
    });
    document.addEventListener('click', next);

    // ================================================================
    // RSS — shared fetch for both cards and ticker
    // ================================================================
    var tickerInner = document.getElementById('ticker-inner');
    var tickerScroll = document.getElementById('ticker-scroll');

    // Load news.json — classify as rich (full slide) or compact (two per slide)
    function rssFetchAll(callback) {
        var req = new XMLHttpRequest();
        req.open('GET', NEWS_JSON + '?v=' + Date.now());
        req.timeout = 8000;
        req.onload = function() {
            var rich = [], compact = [];
            try {
                var d = JSON.parse(req.responseText);
                (d.items || []).forEach(function(it) {
                    if (!it.title) return;
                    if (it.lab_paper) {
                        rich.push({ type: 'lab_paper', duration: CONFIG.rssCardDuration,
                                    title: it.title, abstract: it.abstract || '',
                                    authors: it.authors || '', published: it.published || '',
                                    venue: it.venue || '', researcher: it.researcher || {},
                                    citationCount: it.citationCount || 0,
                                    recentCitations: it.recentCitations || 0,
                                    screen: 'both' });
                        return;
                    }
                    var rssItem = { title:     it.title,
                                    abstract:  it.abstract  || '',
                                    authors:   it.authors   || '',
                                    published: it.published || '',
                                    feedName:  it.feedName,
                                    image:     it.image     || '',
                                    screen:    it.screen    || 'both' };
                    if (rssItem.abstract || rssItem.image) {
                        rich.push({ type: 'rss_card', duration: CONFIG.rssCardDuration, _rssItem: rssItem });
                    } else {
                        compact.push(rssItem);
                    }
                });
            } catch(e) {}
            callback(rich);
        };
        req.onerror = req.ontimeout = function() { callback([]); };
        req.send();
    }

    function tickerBuild(rssItems) {
        var FALLBACK = [
            'ScienceDaily: Latest nutrition and food science discoveries',
            'Phys.org: Advances in analytical chemistry and food analysis',
            'Frontiers Nutrition: Open-access research on diet and health',
            'Nutrients: MDPI journal on human nutrition and metabolism',
            'European Journal of Nutrition: Clinical and experimental research',
        ];
        var titles = [];
        rssItems.forEach(function(it) {
            if (it.type === 'lab_paper') {
                return; // lab papers appear in slides only, not ticker
            } else if (it.type === 'rss_card') {
                var s = it._rssItem.screen || 'both';
                if (s === 'right' || s === 'both')
                    titles.push(it._rssItem.feedName + ':  ' + it._rssItem.title);
            } else if (it.type === 'rss_dual') {
                it._cards.forEach(function(c) {
                    if (!c) return;
                    var s = c.screen || 'both';
                    if (s === 'right' || s === 'both')
                        titles.push(c.feedName + ':  ' + c.title);
                });
            }
        });
        if (!titles.length) titles = FALLBACK;
        var arr = shuffle(titles);
        var text = arr.join('   \u25C6   ');
        tickerInner.textContent = text;
        tickerInner.style.animation = 'none';
        tickerInner.getBoundingClientRect();
        var containerW = tickerScroll.offsetWidth || 800;
        var textW = text.length * 14; // ~14px per char at 1.5em
        var duration = Math.round((containerW + textW) / 80);
        tickerInner.style.animation = duration + 's ticker-move linear infinite';
    }

    // ================================================================
    // INIT — load slides.json, fetch RSS, then start
    // ================================================================
    var xhr = new XMLHttpRequest();
    xhr.open('GET', 'slides.json?v=' + Date.now());
    xhr.onload = function() {
        if (xhr.status === 200) {
            try {
                var data = JSON.parse(xhr.responseText);
                pool = data.pool || data;
            } catch(e) {}
        }
        rssFetchAll(function(rssItems) {
            rssItems.forEach(function(item) { pool.push(item); });
            buildPool();
            playlist = buildPlaylist();
            // Each screen starts at a random position → true independence
            showSlide(Math.floor(Math.random() * Math.max(1, playlist.length)));
            tickerBuild(rssItems);
        });
    };
    xhr.onerror = function() {
        buildPool();
        playlist = buildPlaylist();
        showSlide(0);
    };
    xhr.send();

    // ================================================================
    // CLOCK — fixed bottom-right, 24h HH:MM
    // ================================================================
    var clockHH = document.getElementById('clock-hh');
    var clockMM = document.getElementById('clock-mm');

    function updateClock() {
        var now = new Date();
        var h = String(now.getHours()).padStart(2, '0');
        var m = String(now.getMinutes()).padStart(2, '0');
        if (clockHH.textContent !== h) clockHH.textContent = h;
        if (clockMM.textContent !== m) clockMM.textContent = m;
        var msToNext = (60 - now.getSeconds()) * 1000 - now.getMilliseconds() + 50;
        setTimeout(updateClock, msToNext);
    }
    updateClock();

    </script>
</body>
