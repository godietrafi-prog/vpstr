<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>World Cup Final 2026 — Demo</title>
  <style>
    *{box-sizing:border-box}html,body{width:100%;height:100%;margin:0;overflow:hidden;background:#041b20;font-family:Arial,"Noto Sans Hebrew",sans-serif;color:#fff}
    body{display:grid;place-items:center}
    .poster{position:absolute;left:50%;top:50%;width:100vh;height:100vw;overflow:hidden;isolation:isolate;container-type:size;transform:translate(-50%,-50%) rotate(270deg);transform-origin:center;background:
      radial-gradient(circle at 50% 38%,rgba(255,218,92,.23),transparent 25%),
      linear-gradient(155deg,#07182d 0%,#073b3b 48%,#061527 100%)}
    body.embedded .poster{position:relative;left:auto;top:auto;width:100%;height:100%;transform:none}
    .poster:before{content:"";position:absolute;inset:-15%;z-index:-2;background:repeating-conic-gradient(from 0deg at 50% 44%,rgba(255,255,255,.075) 0 3deg,transparent 3deg 15deg);animation:spin 28s linear infinite}
    .poster:after{content:"";position:absolute;left:-10%;right:-10%;bottom:-14%;height:40%;z-index:-1;border-radius:50% 50% 0 0;background:radial-gradient(ellipse at 50% 0,#2ea95d 0 35%,#116536 36% 54%,#06341f 55%);box-shadow:0 -12px 70px rgba(68,255,143,.24)}
    .lights{position:absolute;inset:0;background:linear-gradient(111deg,transparent 20%,rgba(255,255,255,.1) 30%,transparent 41%),linear-gradient(249deg,transparent 20%,rgba(255,255,255,.08) 30%,transparent 41%);animation:sweep 5s ease-in-out infinite alternate}
    header{text-align:center;padding:4.5% 4% 0;position:relative;z-index:3}
    .eyebrow{font-size:clamp(14px,2.3vmin,30px);font-weight:800;letter-spacing:.3em;color:#8df4d1;margin-bottom:1.2%}.final-date{display:inline-block;margin-bottom:1.5%;padding:.35em .85em;border:2px solid #ffd95f;border-radius:99px;color:#ffd95f;font-size:clamp(15px,2.2vmin,28px);font-weight:1000;letter-spacing:.14em;box-shadow:0 0 20px rgba(255,217,95,.25);animation:pulse 1.8s ease-in-out infinite}
    h1{font-size:clamp(48px,8.5vmin,108px);line-height:.86;margin:0;text-shadow:0 5px 0 #7b1f4f,0 12px 30px rgba(0,0,0,.6)}
    h1 span{display:block;color:#ffd95f;font-size:.46em;line-height:1.4;letter-spacing:.08em}
    .match{position:relative;z-index:4;display:grid;grid-template-columns:minmax(0,1fr) auto minmax(0,1fr);gap:4%;align-items:center;width:88%;margin:5% auto 0;direction:ltr}
    .team{min-width:0;text-align:center;animation:float 3.6s ease-in-out infinite}.team.right{animation-delay:-1.8s}
    .flag{position:relative;width:min(100%,300px);aspect-ratio:4/3;margin:auto;border-radius:24px;border:clamp(5px,.7vmin,10px) solid #fff;box-shadow:0 0 0 6px #ffd95f,0 18px 45px rgba(0,0,0,.5);overflow:hidden;display:grid;place-items:center}
    .flag.spain{background:linear-gradient(to bottom,#aa151b 0 25%,#f1bf00 25% 75%,#aa151b 75%)}
    .flag.argentina{background:linear-gradient(to bottom,#75aadb 0 33.33%,#fff 33.33% 66.66%,#75aadb 66.66%)}
    .crest{position:relative;z-index:2;font-size:clamp(52px,8vmin,108px);line-height:1;filter:drop-shadow(0 5px 4px rgba(0,0,0,.25));animation:pulse 1.8s ease-in-out infinite}
    .team-label{margin-top:5%;font-weight:900;font-size:clamp(24px,3.7vmin,48px);letter-spacing:.03em}.team-label small{display:block;color:#9cefd4;font-size:.46em;margin-bottom:.4em;letter-spacing:.18em}
    .center{text-align:center;min-width:12vmin}.cup{font-size:clamp(88px,14vmin,180px);filter:drop-shadow(0 14px 16px rgba(0,0,0,.45));animation:cup 2.5s ease-in-out infinite}.vs{display:inline-block;background:#fff;color:#7b1749;font-weight:1000;font-size:clamp(26px,4vmin,54px);padding:.14em .38em;border-radius:999px;box-shadow:0 8px 0 #ffd95f;transform:rotate(-6deg)}
    .market{position:relative;z-index:5;width:min(76%,760px);margin:4.5% auto 0;padding:2.3% 3%;border:1px solid rgba(255,255,255,.25);border-radius:24px;background:rgba(4,16,35,.92);box-shadow:0 18px 50px rgba(0,0,0,.3)}
    .market-head{display:flex;justify-content:space-between;align-items:center;gap:20px;margin-bottom:2%;font-size:clamp(12px,1.8vmin,22px);font-weight:800;letter-spacing:.12em;color:#9cefd4}.poly{color:#fff;font-size:1.25em;letter-spacing:-.03em}.poly b{display:inline-grid;place-items:center;width:1.65em;height:1.65em;margin-right:.4em;border-radius:7px;background:#2453ff;color:white;transform:skew(-8deg)}
    .odds{display:grid;grid-template-columns:54fr 46fr;overflow:hidden;border-radius:14px;font-size:clamp(18px,2.5vmin,32px);font-weight:900;text-align:center}.odds span{padding:.38em .25em;white-space:nowrap}.odds b{display:block;margin-top:.12em;font-size:1.3em}.odds .es{background:#e7f7ef;color:#08774b}.odds .ar{background:#ffe9ef;color:#a51f4b}.demo-note{text-align:center;margin-top:1.3%;font-size:clamp(10px,1.35vmin,16px);letter-spacing:.13em;color:#a9bdc8}.polymarket-live .demo-note{color:#72f3cf}
    .details{position:absolute;z-index:5;left:50%;bottom:3.5%;transform:translateX(-50%);text-align:center;width:90%}.details strong{display:block;font-size:clamp(24px,3.6vmin,48px);color:#ffd95f}.details span{font-size:clamp(16px,2.2vmin,30px);font-weight:700}
    .confetti{position:absolute;inset:0;z-index:6;pointer-events:none}.confetti i{position:absolute;top:-12%;width:12px;height:28px;border-radius:3px;background:var(--c);left:var(--x);animation:fall var(--d) linear infinite;animation-delay:var(--delay);transform:rotate(var(--r))}
    .ball{position:absolute;z-index:3;left:50%;bottom:14%;font-size:clamp(42px,6vmin,78px);animation:ball 4.5s ease-in-out infinite;filter:drop-shadow(0 12px 8px rgba(0,0,0,.4))}
    @keyframes spin{to{transform:rotate(360deg)}}@keyframes sweep{to{transform:translateX(4%) scale(1.08)}}
    @keyframes float{50%{transform:translateY(-18px) rotate(-1deg)}}@keyframes pulse{50%{transform:scale(1.12);filter:drop-shadow(0 0 18px #fff)}}
    @keyframes cup{50%{transform:translateY(-13px) scale(1.04);filter:drop-shadow(0 0 28px #ffd95f)}}
    @keyframes fall{to{top:112%;transform:translateX(90px) rotate(680deg)}}
    @keyframes ball{0%{transform:translate(-42cqw,0) rotate(0)}45%{transform:translate(-50%,-6cqh) rotate(540deg)}100%{transform:translate(38cqw,0) rotate(1080deg)}}
    @media(max-width:700px){.match{gap:2vw}.flag{border-radius:18px}.center{min-width:12vw}.details{bottom:4vh}}
  </style>
</head>
<body>
  <main class="poster">
    <div class="lights"></div>
    <header><div class="eyebrow">THE BIGGEST NIGHT IN FOOTBALL</div><div class="final-date" data-final-date>JULY 19 · 2026</div><h1>WORLD CUP FINAL <span>2026</span></h1></header>
    <section class="match">
      <article class="team left"><div class="flag spain"><b class="crest">🇪🇸</b></div><div class="team-label"><small>FINALIST</small>SPAIN</div></article>
      <div class="center"><div class="cup">🏆</div><div class="vs">VS</div></div>
      <article class="team right"><div class="flag argentina"><b class="crest">☀️</b></div><div class="team-label"><small>FINALIST</small>ARGENTINA</div></article>
    </section>
    <section class="market">
      <div class="market-head"><span class="poly"><b>◇</b>POLYMARKET</span><span>WHO WILL LIFT THE TROPHY?</span></div>
      <div class="odds" data-poly-bar><span class="es">SPAIN<b data-poly-spain>—</b></span><span class="ar">ARGENTINA<b data-poly-argentina>—</b></span></div>
      <div class="demo-note" data-poly-status>CONNECTING TO POLYMARKET…</div>
    </section>
    <div class="ball">⚽</div>
    <div class="details"><strong>THE WORLD IS WATCHING</strong><span>Two nations · One dream · One champion</span></div>
    <div class="confetti" aria-hidden="true">
      <i style="--x:5%;--c:#ffd95f;--d:5s;--delay:-1s;--r:13deg"></i><i style="--x:13%;--c:#ee397d;--d:6s;--delay:-4s;--r:45deg"></i>
      <i style="--x:22%;--c:#63e6be;--d:4.7s;--delay:-2s;--r:90deg"></i><i style="--x:33%;--c:#fff;--d:6.4s;--delay:-5s;--r:20deg"></i>
      <i style="--x:44%;--c:#ee397d;--d:5.5s;--delay:-3s;--r:60deg"></i><i style="--x:55%;--c:#ffd95f;--d:4.8s;--delay:-1.5s;--r:5deg"></i>
      <i style="--x:66%;--c:#63e6be;--d:6.2s;--delay:-4.4s;--r:120deg"></i><i style="--x:75%;--c:#fff;--d:5.2s;--delay:-2.3s;--r:35deg"></i>
      <i style="--x:85%;--c:#ffd95f;--d:6.6s;--delay:-5.4s;--r:75deg"></i><i style="--x:94%;--c:#ee397d;--d:4.6s;--delay:-.8s;--r:10deg"></i>
    </div>
  </main>
  <script src="promo-date.js"></script><script src="polymarket-live.js"></script><script>if(/[?&]embedded=1(?:&|$)/.test(location.search))document.body.classList.add('embedded');</script>
</body>
</html>
